<!DOCTYPE html>
<html>
<head>
  <title>For You ❤️</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      background: #f7e9ff;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial;
    }

    /* ✉️ ENVELOPE */
    .envelope {
      width: 360px;
      height: 240px;
      background: white;
      border-radius: 10px;
      position: relative;
      box-shadow: 0 15px 35px rgba(0,0,0,0.2);
      cursor: pointer;
      z-index: 5;
      transition: opacity 0.6s ease;
    }

    .envelope::before {
      content: "";
      position: absolute;
      border-left: 180px solid transparent;
      border-right: 180px solid transparent;
      border-top: 120px solid #e8d7ff;
      top: 0;
      left: 0;
    }

    .heart {
      position: absolute;
      width: 50px;
      height: 50px;
      background: #d1003f;
      top: 95px;
      left: 155px;
      transform: rotate(45deg);
    }

    .heart::before,
    .heart::after {
      content: "";
      position: absolute;
      width: 50px;
      height: 50px;
      background: #d1003f;
      border-radius: 50%;
    }

    .heart::before { top: -25px; left: 0; }
    .heart::after { left: -25px; top: 0; }

    /* 💌 LETTER */
    .letter {
      position: fixed;
      inset: 0;
      background: #fffafc;
      padding: 40px;
      opacity: 0;
      transition: opacity 1s ease;
      z-index: 1;
    }

    /* 💥 EMOJIS */
    .emoji {
      position: absolute;
      font-size: 24px;
      opacity: 0;
      transform: translate(0,0) scale(0.3);
      transition: all 1.8s ease;
      z-index: 10;
    }

    /* STATES */
    .open .envelope {
      opacity: 0;
    }

    .open .heart {
      opacity: 0;
    }

    .open .letter {
      opacity: 1;
    }

  </style>
</head>

<body>

<div id="container">

  <div class="envelope" onclick="explode()">
    <div class="heart"></div>
  </div>

  <div class="letter">
    <h1>My Love ❤️</h1>
    <p>This is everything I want to tell you...</p>
    <h3>100 Things I Love About You</h3>
    <ul>
      <li>Your smile</li>
      <li>Your laugh</li>
      <li>Your kindness</li>
    </ul>
  </div>

</div>

<script>
const emojis = ["❤️","🫶","💐","🌹"];
let exploded = false;

function explode() {
  if (exploded) return;
  exploded = true;

  const container = document.getElementById("container");

  container.classList.add("open");

  // create 120 emojis
  for (let i = 0; i < 120; i++) {
    const el = document.createElement("div");
    el.className = "emoji";
    el.innerText = emojis[Math.floor(Math.random() * emojis.length)];

    // start center (inside envelope)
    el.style.left = "50%";
    el.style.top = "50%";

    document.body.appendChild(el);

    // random explosion direction
    const x = (Math.random() - 0.5) * 1200;
    const y = (Math.random() - 0.5) * 800;
    const scale = 1 + Math.random() * 3;

    setTimeout(() => {
      el.style.opacity = "1";
      el.style.transform = `translate(${x}px, ${y}px) scale(${scale})`;
    }, 50);

    // fade out later
    setTimeout(() => {
      el.style.opacity = "0";
    }, 1600);
  }

  // show letter after explosion
  setTimeout(() => {
    document.querySelector(".letter").style.opacity = "1";
  }, 1800);
}
</script>

</body>
</html>
