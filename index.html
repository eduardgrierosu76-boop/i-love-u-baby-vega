<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial;
  background: #120018;
}

/* 🌌 BACKGROUND HEARTS (SAFE - NO BLOCKING) */
.bg-heart {
  position: fixed;
  z-index: 0;
  pointer-events: none;
  color: rgba(255, 0, 80, 0.18);
  animation: floatUp linear infinite;
}

@keyframes floatUp {
  from { transform: translateY(100vh); }
  to { transform: translateY(-10vh); }
}

/* CENTER STAGE */
.stage {
  position: fixed;
  inset: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 5;
}

/* ✉️ ENVELOPE (CLICK FIXED) */
.envelope {
  width: 340px;
  height: 220px;
  position: relative;
  cursor: pointer;
  z-index: 10; /* IMPORTANT */
  transform-style: preserve-3d;
  transition: transform 1.2s ease;
}

.envelope.open {
  transform: rotateX(60deg) translateY(-40px);
}

/* BODY */
.base {
  position: absolute;
  width: 100%;
  height: 100%;
  background: white;
  border-radius: 10px;
  box-shadow: 0 30px 80px rgba(0,0,0,0.5);
}

/* FLAP */
.flap {
  position: absolute;
  width: 100%;
  height: 60%;
  top: 0;
  background: white;
  clip-path: polygon(0 0, 100% 0, 50% 100%);
  transform-origin: top;
  transition: 1s ease;
}

.envelope.open .flap {
  transform: rotateX(-180deg);
}

/* HEART */
.heart {
  position: absolute;
  top: 55%;
  left: 50%;
  width: 55px;
  height: 55px;
  transform: translate(-50%, -50%) rotate(45deg);
  background: #d1003f;
  animation: pulse 1s infinite;
}

.heart::before,
.heart::after {
  content: "";
  position: absolute;
  width: 55px;
  height: 55px;
  background: #d1003f;
  border-radius: 50%;
}

.heart::before { top: -27px; }
.heart::after { left: -27px; }

@keyframes pulse {
  0% { transform: translate(-50%, -50%) rotate(45deg) scale(1); }
  50% { transform: translate(-50%, -50%) rotate(45deg) scale(1.2); }
  100% { transform: translate(-50%, -50%) rotate(45deg) scale(1); }
}

/* TEXT */
.text {
  position: absolute;
  bottom: 10px;
  width: 100%;
  text-align: center;
  font-size: 14px;
  color: #7a4a6a;
}

/* 💥 EMOJIS */
.particle {
  position: fixed;
  font-size: 40px;
  pointer-events: none;
  z-index: 99999;
  animation: fly 2s ease-out forwards;
}

@keyframes fly {
  to {
    transform: translate(var(--x), var(--y)) scale(2);
    opacity: 0;
  }
}

/* 📄 LETTER */
.letter {
  position: fixed;
  inset: 0;
  background: #fffaf5;
  padding: 20px;
  overflow-y: auto;
  opacity: 0;
  transform: translateY(40px);
  transition: 1s ease;
  z-index: 9999;
}

.letter.show {
  opacity: 1;
  transform: translateY(0);
}

#typed {
  white-space: pre-wrap;
  line-height: 1.6;
  font-size: 14px;
}
</style>
</head>

<body>

<!-- BACKGROUND HEARTS -->
<script>
for (let i = 0; i < 25; i++) {
  const h = document.createElement("div");
  h.className = "bg-heart";
  h.innerText = "❤️";

  h.style.left = Math.random() * 100 + "vw";
  h.style.animationDuration = (5 + Math.random() * 6) + "s";
  h.style.fontSize = (14 + Math.random() * 18) + "px";

<div class="stage">

<div class="envelope" id="env" onclick="openEnvelope()">

/* OPEN FUNCTION */
function openEnvelope() {

  const env = document.getElementById("env");

  // FORCE CLICK RESPONSE (fix mobile blocking edge cases)
  env.style.pointerEvents = "none";

  env.classList.add("open");

  const rect = env.getBoundingClientRect();
  const cx = rect.left + rect.width/2;
  const cy = rect.top + rect.height/2;

  const emojis = ["❤️","💖","💘","💞","💋"];

  // EMOJIS BURST FROM INSIDE
  for (let i = 0; i < 80; i++) {
    const e = document.createElement("div");
    e.className = "particle";
    e.innerText = emojis[Math.floor(Math.random()*emojis.length)];

    e.style.left = cx + "px";
    e.style.top = cy + "px";

    e.style.setProperty("--x", (Math.random()*900-450)+"px");
    e.style.setProperty("--y", (-Math.random()*1000)+"px");

    document.body.appendChild(e);

    setTimeout(() => e.remove(), 2200);
  }

  // SHOW LETTER
  setTimeout(() => {
    document.getElementById("letter").classList.add("show");
    typeText();
  }, 1800);
}

/* TYPEWRITER */
function typeText() {
  let i = 0;
  const el = document.getElementById("typed");

  function t() {
    if (i < text.length) {
      el.innerHTML += text[i];
      i++;
      setTimeout(t, 2);
    }
  }
  t();
}
