<!DOCTYPE html>
<html>
<head>
  <title>For You ❤️</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #f7e9ff;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial;
      overflow: hidden;
    }

    /* 💌 ENVELOPE */
    .envelope {
      width: 360px;
      height: 240px;
      background: white;
      border-radius: 10px;
      position: relative;
      box-shadow: 0 15px 35px rgba(0,0,0,0.2);
      cursor: pointer;
      z-index: 5;
      transition: opacity 0.6s ease;
    }

    /* envelope flap */
    .envelope::before {
      content: "";
      position: absolute;
      width: 0;
      height: 0;
      border-left: 180px solid transparent;
      border-right: 180px solid transparent;
      border-top: 120px solid #e8d7ff;
      top: 0;
      left: 0;
    }

    /* ❤️ HEART */
    .heart {
      position: absolute;
      width: 50px;
      height: 50px;
      background: #d1003f;
      top: 95px;
      left: 155px;
      transform: rotate(45deg);
    }

    .heart::before,
    .heart::after {
      content: "";
      position: absolute;
      width: 50px;
      height: 50px;
      background: #d1003f;
      border-radius: 50%;
    }

    .heart::before { top: -25px; left: 0; }
    .heart::after { left: -25px; top: 0; }

    /* 🌸 FLOWERS OVERLAY */
    .flowers {
      position: fixed;
      inset: 0;
      background: url("https://i.imgur.com/0Yb1G3Q.png"); /* simple flower pattern */
      background-size: cover;
      opacity: 0;
      pointer-events: none;
      transition: opacity 1.5s ease;
      z-index: 10;
    }

    /* 💌 LETTER UNDER EVERYTHING */
    .letter {
      position: fixed;
      inset: 0;
      background: #fffafc;
      padding: 40px;
      box-sizing: border-box;
      opacity: 0;
      z-index: 1;
      transition: opacity 1.5s ease;
    }

    /* STATES */
    .open .envelope {
      opacity: 0;
    }

    .open .heart {
      opacity: 0;
    }

    .open .flowers {
      opacity: 1;
    }

    .show-letter .flowers {
      opacity: 0;
    }

    .show-letter .letter {
      opacity: 1;
    }

  </style>
</head>

<body>

<div id="container">

  <div class="envelope" onclick="openScene()">
    <div class="heart"></div>
  </div>

  <div class="flowers"></div>

  <div class="letter">
    <h1>My Love ❤️</h1>
    <p>This is everything I want to tell you...</p>
    <h3>100 Things I Love</h3>
    <ul>
      <li>Your smile</li>
      <li>Your laugh</li>
      <li>Your kindness</li>
    </ul>
  </div>

</div>

<script>
let stage = 0;

function openScene() {
  const c = document.getElementById("container");

  if (stage === 0) {
    c.classList.add("open");
    stage = 1;

    setTimeout(() => {
      c.classList.add("show-letter");
    }, 2000);
  }
}
</script>

</body>
</html>
