<!DOCTYPE html>
<html>
<head>
  <title>For You ❤️</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #ffe4ec;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial;
    }

    .scene {
      text-align: center;
    }

    /* ENVELOPE (PURE WHITE) */
    .envelope {
      position: relative;
      width: 340px;
      height: 220px;
      background: #ffffff;
      border-radius: 10px;
      cursor: pointer;
      box-shadow: 0 12px 30px rgba(0,0,0,0.2);
      overflow: hidden;
    }

    /* FRONT HEART (PRINTED ON ENVELOPE FACE) */
    .front-heart {
      position: absolute;
      width: 50px;
      height: 50px;
      background: #e60026;
      top: 85px;
      left: 145px;
      transform: rotate(45deg);
      z-index: 2;
      transition: opacity 0.4s ease;
    }

    .front-heart::before,
    .front-heart::after {
      content: "";
      position: absolute;
      width: 50px;
      height: 50px;
      background: #e60026;
      border-radius: 50%;
    }

    .front-heart::before { top: -25px; left: 0; }
    .front-heart::after { left: -25px; top: 0; }

    /* FLAP (TOP TRIANGLE) */
    .flap {
      position: absolute;
      width: 0;
      height: 0;
      border-left: 170px solid transparent;
      border-right: 170px solid transparent;
      border-top: 120px solid #f2f2f2;
      top: 0;
      left: 0;
      transform-origin: top;
      transition: 0.6s ease;
      z-index: 3;
    }

    /* PAPER (START INSIDE CENTER SMALL) */
    .paper {
      position: absolute;
      width: 140px;
      height: 160px;
      background: white;
      left: 100px;
      top: 60px;
      border-radius: 6px;
      padding: 10px;
      box-sizing: border-box;
      transform: scale(0.3);
      transform-origin: center;
      transition: 0.8s ease;
      z-index: 1;
      overflow: hidden;
    }

    /* STAGE 1 */
    .stage1 .flap {
      transform: rotateX(180deg);
    }

    .stage1 .paper {
      transform: scale(0.7);
      top: 20px;
    }

    /* STAGE 2 (FULL OPEN) */
    .stage2 .paper {
      transform: scale(1.6);
      top: -140px;
    }

    /* WHEN FULLY OPEN → HEART DISAPPEARS */
    .stage2 .front-heart {
      opacity: 0;
    }

    h2 {
      margin: 0;
      font-size: 16px;
    }

    ul {
      text-align: left;
      padding-left: 15px;
      font-size: 12px;
    }

    .hint {
      margin-top: 15px;
    }
  </style>
</head>

<body>

<div class="scene">
  <div class="envelope" id="env" onclick="openEnvelope()">

    <div class="flap"></div>

    <div class="front-heart"></div>

    <div class="paper">
      <h2>My Love ❤️</h2>
      <p>This is everything I want you to know...</p>

      <h3>100 Things I Love</h3>
      <ul>
        <li>Your smile</li>
        <li>Your laugh</li>
        <li>Your kindness</li>
      </ul>
    </div>

  </div>

  <p class="hint">Click → open → reveal 💌</p>
</div>

<script>
let stage = 0;

function openEnvelope() {
  const env = document.getElementById("env");

  if (stage === 0) {
    env.classList.add("stage1");
    stage = 1;
  } else if (stage === 1) {
    env.classList.add("stage2");
    stage = 2;
  }
}
</script>

</body>
</html>
