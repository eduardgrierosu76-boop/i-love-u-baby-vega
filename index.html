<!DOCTYPE html>
<html>
<head>
  <title>For You ❤️</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #f7e9ff;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial;
      overflow: hidden;
    }

    /* 🌸 BACKGROUND HEARTS (FORCED VISIBILITY) */
    .heart-bg {
      position: absolute;
      background: #ff4f7b;
      opacity: 0.2;
      transform: rotate(45deg);
      z-index: 0;
    }

    .heart-bg::before,
    .heart-bg::after {
      content: "";
      position: absolute;
      background: #ff4f7b;
      border-radius: 50%;
      width: 100%;
      height: 100%;
    }

    .h1 { width: 60px; height: 60px; top: 10%; left: 15%; }
    .h2 { width: 40px; height: 40px; top: 70%; left: 80%; }
    .h3 { width: 50px; height: 50px; top: 30%; left: 75%; }

    /* ENVELOPE AREA */
    .scene {
      z-index: 2;
      text-align: center;
      position: relative;
    }

    /* ENVELOPE */
    .envelope {
      position: relative;
      width: 360px;
      height: 240px;
      background: #ffffff;
      border-radius: 10px;
      cursor: pointer;
      box-shadow: 0 15px 35px rgba(0,0,0,0.2);
      overflow: hidden;
    }

    /* FLAP */
    .flap {
      position: absolute;
      width: 0;
      height: 0;
      border-left: 180px solid transparent;
      border-right: 180px solid transparent;
      border-top: 130px solid #e8d7ff;
      top: 0;
      left: 0;
      transform-origin: top;
      transition: 0.7s ease;
      z-index: 3;
    }

    /* HEART ON ENVELOPE */
    .heart {
      position: absolute;
      width: 55px;
      height: 55px;
      background: #d1003f;
      top: 92px;
      left: 152px;
      transform: rotate(45deg);
      z-index: 5;
      transition: opacity 0.4s ease;
    }

    .heart::before,
    .heart::after {
      content: "";
      position: absolute;
      width: 55px;
      height: 55px;
      background: #d1003f;
      border-radius: 50%;
    }

    .heart::before { top: -27px; left: 0; }
    .heart::after { left: -27px; top: 0; }

    /* 📄 PAPER (REAL A4 FEEL) */
    .paper {
      position: absolute;
      width: 210mm;   /* A4 width */
      height: 297mm;  /* A4 height */
      max-width: 90vw;
      max-height: 85vh;

      background: #fffafc;
      top: 240px;
      left: 50%;
      transform: translateX(-50%);
      border-radius: 10px;
      padding: 20px;
      box-sizing: border-box;

      transition: all 1s ease;
      z-index: 1;

      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      overflow: hidden;
    }

    /* STAGE 1 */
    .stage1 .flap {
      transform: rotateX(180deg);
    }

    .stage1 .paper {
      top: 20px;
    }

    /* STAGE 2 (FULL A4 REVEAL) */
    .stage2 .paper {
      top: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
    }

    /* HEART DISAPPEARS */
    .stage1 .heart,
    .stage2 .heart {
      opacity: 0;
    }

    ul {
      text-align: left;
    }

    h2 {
      margin-top: 0;
    }
  </style>
</head>

<body>

<!-- 🌸 HEARTS (NOW DEFINITELY VISIBLE) -->
<div class="heart-bg h1"></div>
<div class="heart-bg h2"></div>
<div class="heart-bg h3"></div>

<div class="scene">
  <div class="envelope" id="env" onclick="openEnvelope()">

    <div class="flap"></div>
    <div class="heart"></div>

    <div class="paper">
      <h2>My Love ❤️</h2>
      <p>This is everything I want you to know...</p>

      <h3>100 Things I Love</h3>
      <ul>
        <li>Your smile</li>
        <li>Your laugh</li>
        <li>Your kindness</li>
      </ul>
    </div>

  </div>
</div>

<script>
let stage = 0;

function openEnvelope() {
  const env = document.getElementById("env");

  if (stage === 0) {
    env.classList.add("stage1");
    stage = 1;
  } else if (stage === 1) {
    env.classList.add("stage2");
    stage = 2;
  }
}
</script>

</body>
</html>
