<!DOCTYPE html>
<html>
<head>
  <title>For You ❤️</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #f7e9ff;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial;
      overflow: hidden;
    }

    /* 🌸 BACKGROUND HEARTS */
    .heart-bg {
      position: absolute;
      background: #ff4f7b;
      opacity: 0.2;
      transform: rotate(45deg);
      z-index: 0;
    }

    .heart-bg::before,
    .heart-bg::after {
      content: "";
      position: absolute;
      background: #ff4f7b;
      border-radius: 50%;
      width: 100%;
      height: 100%;
    }

    .h1 { width: 60px; height: 60px; top: 10%; left: 15%; }
    .h2 { width: 40px; height: 40px; top: 70%; left: 80%; }
    .h3 { width: 50px; height: 50px; top: 30%; left: 75%; }

    /* ENVELOPE */
    .envelope {
      position: relative;
      width: 360px;
      height: 240px;
      background: #ffffff;
      border-radius: 10px;
      cursor: pointer;
      box-shadow: 0 15px 35px rgba(0,0,0,0.2);
      overflow: hidden;
      z-index: 2;
      transition: all 0.8s ease;
    }

    .flap {
      position: absolute;
      width: 0;
      height: 0;
      border-left: 180px solid transparent;
      border-right: 180px solid transparent;
      border-top: 130px solid #e8d7ff;
      top: 0;
      left: 0;
      transform-origin: top;
      transition: 0.7s ease;
      z-index: 3;
    }

    .heart {
      position: absolute;
      width: 55px;
      height: 55px;
      background: #d1003f;
      top: 92px;
      left: 152px;
      transform: rotate(45deg);
      z-index: 5;
      transition: opacity 0.4s ease;
    }

    .heart::before,
    .heart::after {
      content: "";
      position: absolute;
      width: 55px;
      height: 55px;
      background: #d1003f;
      border-radius: 50%;
    }

    .heart::before { top: -27px; left: 0; }
    .heart::after { left: -27px; top: 0; }

    /* 📄 LETTER (A4 FULL SCREEN) */
    .letter {
      position: fixed;
      top: 50%;
      left: 50%;
      width: 210mm;
      height: 297mm;
      max-width: 95vw;
      max-height: 95vh;

      background: #fffafc;
      transform: translate(-50%, -50%) scale(0);
      padding: 25px;
      box-sizing: border-box;

      border-radius: 10px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.25);

      opacity: 0;
      transition: all 0.9s ease;
      z-index: 10;
    }

    /* OPEN STATE */
    .open .envelope {
      transform: scale(0.8);
      opacity: 0;
    }

    .open .heart {
      opacity: 0;
    }

    .open .letter {
      transform: translate(-50%, -50%) scale(1);
      opacity: 1;
    }

    h2 { margin-top: 0; }

    ul { text-align: left; }
  </style>
</head>

<body>

<!-- 🌸 BACKGROUND HEARTS -->
<div class="heart-bg h1"></div>
<div class="heart-bg h2"></div>
<div class="heart-bg h3"></div>

<div id="container">

  <div class="envelope" onclick="openLetter()">
    <div class="flap"></div>
    <div class="heart"></div>
  </div>

  <div class="letter">
    <h2>My Love ❤️</h2>
    <p>This is everything I want you to know...</p>

    <h3>100 Things I Love About You</h3>
    <ul>
      <li>Your smile</li>
      <li>Your laugh</li>
      <li>Your kindness</li>
    </ul>
  </div>

</div>

<script>
function openLetter() {
  document.getElementById("container").classList.add("open");
}
</script>

</body>
</html>
