<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: #f7e9ff;
  font-family: Arial;
}

/* 💗 BACKGROUND HEARTS */
.bg-heart {
  position: fixed;
  z-index: 1;
  pointer-events: none;
  color: rgba(255, 0, 80, 0.25);
  font-size: 18px;
  animation: floatUp linear infinite;
}

@keyframes floatUp {
  from { transform: translateY(100vh); }
  to { transform: translateY(-10vh); }
}

/* 📦 PERSPECTIVE */
.scene {
  position: absolute;
  inset: 0;
  perspective: 900px;
}

/* ✉️ ENVELOPE */
.envelope {
  width: 320px;
  height: 220px;

  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  transform-style: preserve-3d;

  cursor: pointer;
  z-index: 50;
}

/* 📦 BODY (BOTTOM) */
.body {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 72%;

  background: white;
  border-radius: 10px;

  box-shadow: 0 25px 50px rgba(0,0,0,0.25);
  z-index: 1;
}

/* 🔺 FLAP (OVERLAPS BODY TO REMOVE GAP) */
.flap {
  position: absolute;
  top: -2px; /* 👈 IMPORTANT: overlaps body */
  width: 100%;
  height: 62%;

  background: white;
  clip-path: polygon(0 0, 100% 0, 50% 100%);

  transform-origin: top;
  transition: transform 1s ease;

  z-index: 3;

  box-shadow: 0 8px 12px rgba(0,0,0,0.12);
}

.open .flap {
  transform: rotateX(-160deg);
}

/* 🧩 CREASE FIX LAYER (THIS REMOVES THE “EMPTY SPACE”) */
.crease {
  position: absolute;
  top: 60%;
  left: 0;
  width: 100%;
  height: 20px;
  background: white;
  z-index: 2;
}

/* ❤️ HEART */
.heart {
  position: absolute;
  top: 55%;
  left: 50%;
  transform: translate(-50%, -50%) rotate(45deg);
  width: 55px;
  height: 55px;
  background: #d1003f;
  z-index: 5;
  animation: pulse 1.2s infinite;
}

.heart::before,
.heart::after {
  content: "";
  position: absolute;
  width: 55px;
  height: 55px;
  background: #d1003f;
  border-radius: 50%;
}

.heart::before { top: -27px; left: 0; }
.heart::after { left: -27px; top: 0; }

@keyframes pulse {
  0% { transform: translate(-50%, -50%) rotate(45deg) scale(1); }
  50% { transform: translate(-50%, -50%) rotate(45deg) scale(1.2); }
  100% { transform: translate(-50%, -50%) rotate(45deg) scale(1); }
}

/* 📝 TEXT */
.text {
  position: absolute;
  bottom: 18px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 14px;
  color: #7a4a6a;
  z-index: 6;
}

/* 💥 EMOJIS */
.particle {
  position: fixed;
  z-index: 9999;
  pointer-events: none;
  opacity: 0;
  transition: transform 1.6s ease, opacity 2s ease;
}

/* 📄 LETTER */
.letter {
  position: fixed;
  inset: 12px;
  background: #fffafc;
  border-radius: 14px;
  padding: 20px;

  opacity: 0;
  transform: scale(0.85);
  transition: 1.2s ease;

  z-index: 100000;
  pointer-events: none;
}

.show .letter {
  opacity: 1;
  transform: scale(1);
}
</style>
</head>

<body>

<div class="scene">

<!-- 💗 BACKGROUND HEARTS -->
<script>
for (let i = 0; i < 18; i++) {
  const h = document.createElement("div");
  h.className = "bg-heart";
  h.innerText = "❤️";

  h.style.left = Math.random() * 100 + "vw";
  h.style.animationDuration = (6 + Math.random() * 6) + "s";
  h.style.fontSize = (14 + Math.random() * 18) + "px";

  document.body.appendChild(h);
}
</script>

<!-- ✉️ ENVELOPE -->
<div class="envelope" onclick="openEnvelope()">

  <div class="flap"></div>
  <div class="body"></div>

  <!-- 🧩 FIX LAYER -->
  <div class="crease"></div>

  <div class="heart"></div>
  <div class="text">for someone special</div>

</div>

<!-- 📄 LETTER -->
<div class="letter">
  <h2>My Love ❤️</h2>
  <p>This is everything I want to tell you...</p>
</div>

</div>

<script>

function openEnvelope() {

  const envelope = document.querySelector(".envelope");
  envelope.classList.add("open");

  const rect = envelope.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;

  const emojis = ["❤️","💖","💘","💞","💋","💐"];

  setTimeout(() => {

    for (let i = 0; i < 120; i++) {

      const p = document.createElement("div");
      p.className = "particle";
      p.innerText = emojis[Math.floor(Math.random() * emojis.length)];

      document.body.appendChild(p);

      p.style.left = cx + "px";
      p.style.top = cy + "px";

      const size = 120 + Math.random() * 260;
      p.style.fontSize = size + "px";

      const angle = Math.random() * Math.PI * 2;
      const dist = 500 + Math.random() * 1000;

      const dx = Math.cos(angle) * dist;
      const dy = Math.sin(angle) * dist;

      setTimeout(() => {
        p.style.opacity = "1";
        p.style.transform = `translate(${dx}px, ${dy}px) scale(2)`;
      }, 50);
    }

  }, 900);

  setTimeout(() => {
    envelope.style.opacity = "0";
  }, 1700);

  setTimeout(() => {
    document.querySelectorAll(".particle").forEach(p => {
      p.style.opacity = "0";
    });
  }, 3000);

  setTimeout(() => {
    document.body.classList.add("show");
  }, 4200);
}

</script>

</body>
</html>
