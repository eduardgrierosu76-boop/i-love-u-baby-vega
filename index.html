<!DOCTYPE html>
<html>
<head>
  <title>For You ❤️</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #f7e9ff; /* softer romantic tone */
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial;
    }

    .scene {
      text-align: center;
    }

    /* ENVELOPE */
    .envelope {
      position: relative;
      width: 340px;
      height: 220px;
      background: #ffffff;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 15px 35px rgba(0,0,0,0.2);
      overflow: hidden;
      transition: transform 0.6s ease;
    }

    /* FLAP */
    .flap {
      position: absolute;
      width: 0;
      height: 0;
      border-left: 170px solid transparent;
      border-right: 170px solid transparent;
      border-top: 120px solid #e8d7ff; /* soft romantic lavender */
      top: 0;
      left: 0;
      transform-origin: top;
      transition: 0.6s ease;
      z-index: 2;
    }

    /* HEART (TOP MOST LAYER ALWAYS FIRST) */
    .heart {
      position: absolute;
      width: 55px;
      height: 55px;
      background: #d1003f;
      top: 82px;
      left: 142px;
      transform: rotate(45deg);
      z-index: 999; /* ALWAYS ON TOP */
      transition: opacity 0.4s ease;
    }

    .heart::before,
    .heart::after {
      content: "";
      position: absolute;
      width: 55px;
      height: 55px;
      background: #d1003f;
      border-radius: 50%;
    }

    .heart::before { top: -27px; left: 0; }
    .heart::after { left: -27px; top: 0; }

    /* PAPER (START SMALL INSIDE) */
    .paper {
      position: absolute;
      width: 260px;
      height: 320px;
      background: #fffafc;
      left: 40px;
      top: 220px;
      border-radius: 10px;
      padding: 15px;
      box-sizing: border-box;
      transition: all 0.9s ease;
      z-index: 1;
      overflow: hidden;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    }

    /* STAGE 1: OPEN ENVELOPE */
    .stage1 .flap {
      transform: rotateX(180deg);
    }

    .stage1 .paper {
      top: 30px;
    }

    /* STAGE 2: FULL SCREEN REVEAL */
    .stage2 .paper {
      position: fixed;
      top: 5%;
      left: 5%;
      width: 90vw;
      height: 90vh;
      z-index: 10;
    }

    /* HEART DISAPPEARS AFTER FIRST CLICK */
    .stage1 .heart,
    .stage2 .heart {
      opacity: 0;
    }

    h2 {
      margin-top: 0;
    }

    ul {
      text-align: left;
    }

    .hint {
      margin-top: 15px;
      color: #444;
    }
  </style>
</head>

<body>

<div class="scene">
  <div class="envelope" id="env" onclick="openEnvelope()">

    <div class="flap"></div>
    <div class="heart"></div>

    <div class="paper">
      <h2>My Love ❤️</h2>
      <p>This is everything I feel for you...</p>

      <h3>100 Things I Love</h3>
      <ul>
        <li>Your smile</li>
        <li>Your laugh</li>
        <li>Your kindness</li>
      </ul>
    </div>

  </div>

  <p class="hint">Click → open → full reveal 💌</p>
</div>

<script>
let stage = 0;

function openEnvelope() {
  const env = document.getElementById("env");

  if (stage === 0) {
    env.classList.add("stage1");
    stage = 1;
  } else if (stage === 1) {
    env.classList.add("stage2");
    stage = 2;
  }
}
</script>

</body>
</html>
