<!DOCTYPE html>
<html>
<head>
  <title>For You ❤️</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #ffe4ec;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial;
    }

    .scene {
      text-align: center;
    }

    /* ENVELOPE BASE */
    .envelope {
      position: relative;
      width: 320px;
      height: 200px;
      background: #ff6f91;
      border-radius: 8px;
      cursor: pointer;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      overflow: hidden;
    }

    /* HEART (CENTER PIECE) */
    .heart {
      position: absolute;
      width: 40px;
      height: 40px;
      background: white;
      top: 80px;
      left: 140px;
      transform: rotate(45deg);
      transition: 0.4s;
      z-index: 3;
    }

    .heart::before,
    .heart::after {
      content: "";
      position: absolute;
      width: 40px;
      height: 40px;
      background: white;
      border-radius: 50%;
    }

    .heart::before { top: -20px; left: 0; }
    .heart::after { left: -20px; top: 0; }

    /* FLAP */
    .flap {
      position: absolute;
      width: 0;
      height: 0;
      border-left: 160px solid transparent;
      border-right: 160px solid transparent;
      border-top: 110px solid #ff4f73;
      top: 0;
      left: 0;
      transform-origin: top;
      transition: 0.6s;
      z-index: 4;
    }

    /* PAPER */
    .paper {
      position: absolute;
      width: 280px;
      height: 380px;
      background: white;
      left: 20px;
      bottom: -380px;
      transition: 0.7s ease;
      padding: 15px;
      box-sizing: border-box;
      z-index: 2;
      border-radius: 5px;
    }

    /* STAGE 1 (opened envelope) */
    .stage1 .flap {
      transform: rotateX(180deg);
    }

    .stage1 .paper {
      bottom: -200px; /* just peeking */
    }

    /* STAGE 2 (fully out) */
    .stage2 .paper {
      bottom: 10px;
    }

    .hint {
      margin-top: 15px;
    }
  </style>
</head>

<body>

<div class="scene">
  <div class="envelope" id="env" onclick="openEnvelope()">
    <div class="flap"></div>
    <div class="heart"></div>

    <div class="paper">
      <h2>My Love 💖</h2>
      <p>This is everything I want you to know...</p>

      <h3>100 Things I Love About You</h3>
      <ul>
        <li>Your smile</li>
        <li>Your laugh</li>
        <li>The way you care</li>
      </ul>
    </div>
  </div>

  <p class="hint">Click once to open, click again to reveal 💌</p>
</div>

<script>
let stage = 0;

function openEnvelope() {
  const env = document.getElementById("env");

  if (stage === 0) {
    env.classList.add("stage1");
    stage = 1;
  } else if (stage === 1) {
    env.classList.add("stage2");
    stage = 2;
  }
}
</script>

</body>
</html>
