<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<style>
  body {
    margin: 0;
    overflow: hidden;
    background: #f7e9ff;
    font-family: Arial;
  }

  audio { display: none; }

  /* ✉️ ENVELOPE */
  .envelope {
    width: 80vw;
    max-width: 320px;
    height: 200px;

    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    cursor: pointer;
    z-index: 20;
  }

  .envelope-body {
    width: 100%;
    height: 100%;
    background: white;
    border-radius: 12px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.25);
    position: absolute;
  }

  .flap {
    position: absolute;
    top: 0;
    left: 0;
    width: 0;
    height: 0;
    border-left: 160px solid transparent;
    border-right: 160px solid transparent;
    border-top: 110px solid #e8d7ff;
    transform-origin: top;
    transition: transform 1s ease;
    z-index: 3;
  }

  .open .flap {
    transform: rotateX(180deg);
  }

  .heart {
    position: absolute;
    width: 45px;
    height: 45px;
    background: #d1003f;
    top: 80px;
    left: 50%;
    transform: translateX(-50%) rotate(45deg);
    z-index: 5;
  }

  .heart::before,
  .heart::after {
    content: "";
    position: absolute;
    width: 45px;
    height: 45px;
    background: #d1003f;
    border-radius: 50%;
  }

  .heart::before { top: -22px; left: 0; }
  .heart::after { left: -22px; top: 0; }

  /* ❤️ BURST HEARTS */
  .particle {
    position: fixed;
    opacity: 0;
    z-index: 50;
    pointer-events: none;
    transition: transform 1.6s ease, opacity 1.6s ease;
    filter: drop-shadow(0 12px 18px rgba(0,0,0,0.25));
  }

  .message {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 46px;
    font-weight: bold;
    color: white;
    opacity: 0;
    text-align: center;
    z-index: 60;
    text-shadow: 0 0 20px rgba(0,0,0,0.5);
  }

  .fade {
    opacity: 0 !important;
    transition: opacity 1.2s ease !important;
  }

</style>
</head>

<body>

<audio id="bgm" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_d1b5b1c3b1.mp3">
</audio>

<div class="envelope" onclick="start()">
  <div class="envelope-body"></div>
  <div class="flap"></div>
  <div class="heart"></div>
</div>

<div class="message">I LOVE YOU ❤️</div>

<script>

function start() {

  const music = document.getElementById("bgm");
  music.play().catch(()=>{});

  document.querySelector(".envelope").classList.add("open");

  /* 💥 HEART BURST FROM ENVELOPE POSITION */

  const rect = document.querySelector(".envelope").getBoundingClientRect();

  const startX = rect.left + rect.width / 2;
  const startY = rect.top + rect.height / 2;

  const count = 60; // controlled amount

  for (let i = 0; i < count; i++) {

    const p = document.createElement("div");
    p.className = "particle";
    p.innerText = "❤️";

    document.body.appendChild(p);

    // start at envelope
    p.style.left = startX + "px";
    p.style.top = startY + "px";

    // BIG hearts
    const size = 120 + Math.random() * 160;
    p.style.fontSize = size + "px";

    // random direction burst
    const angle = Math.random() * Math.PI * 2;
    const distance = 200 + Math.random() * 500;

    const dx = Math.cos(angle) * distance;
    const dy = Math.sin(angle) * distance;

    setTimeout(() => {
      p.style.opacity = "1";
      p.style.transform = `translate(${dx}px, ${dy}px) scale(1.4)`;
    }, 50);
  }

  setTimeout(() => {
    document.querySelector(".message").style.opacity = "1";
  }, 600);

  setTimeout(() => {
    document.querySelector(".envelope").classList.add("fade");
    document.querySelector(".message").classList.add("fade");

    document.querySelectorAll(".particle").forEach(p => {
      p.classList.add("fade");
    });
  }, 2000);
}

</script>

</body>
</html>
