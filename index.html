<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<style>

body {
  margin: 0;
  overflow: hidden;
  font-family: Arial;
  touch-action: manipulation;

  /* 💜 FULL BACKGROUND (BEHIND EVERYTHING) */
  background: radial-gradient(circle at top,
    #6a2a8a 0%,
    #2a0b3d 45%,
    #0a0014 100%);
}

/* 🌟 soft glow overlay */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at 50% 40%,
    rgba(255, 120, 255, 0.18),
    transparent 60%);
  pointer-events: none;
}

/* 💗 FLOATING BACKGROUND HEARTS */
.bg-heart {
  position: fixed;
  z-index: 1;
  pointer-events: none;
  color: rgba(255, 170, 255, 0.25);
  font-size: 18px;
  animation: floatUp linear infinite;
}

@keyframes floatUp {
  from { transform: translateY(100vh); }
  to { transform: translateY(-10vh); }
}

/* ✉️ ENVELOPE */
.envelope {
  width: 340px;
  height: 220px;
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  cursor: pointer;

  /* 🌟 floating shadow */
  filter: drop-shadow(0 25px 45px rgba(0,0,0,0.55));
}

/* BASE */
.base {
  position: absolute;
  width: 100%;
  height: 100%;
  background: #fff;
  border: 2px solid #e6d6df;
  border-radius: 8px;
  z-index: 1;
}

/* ❤️ HEART */
.heart {
  position: absolute;
  top: 55%;
  left: 50%;
  transform: translate(-50%, -50%) rotate(45deg);
  width: 55px;
  height: 55px;
  background: #d1003f;
  z-index: 5;
  animation: pulse 1.2s infinite;
}

.heart::before,
.heart::after {
  content: "";
  position: absolute;
  width: 55px;
  height: 55px;
  background: #d1003f;
  border-radius: 50%;
}

.heart::before { top: -27px; left: 0; }
.heart::after { left: -27px; top: 0; }

@keyframes pulse {
  0% { transform: translate(-50%, -50%) rotate(45deg) scale(1); }
  50% { transform: translate(-50%, -50%) rotate(45deg) scale(1.2); }
  100% { transform: translate(-50%, -50%) rotate(45deg) scale(1); }
}

/* TEXT */
.text {
  position: absolute;
  bottom: 14px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 14px;
  color: #7a4a6a;
  z-index: 6;
}

/* 💥 PARTICLES */
.particle {
  position: fixed;
  z-index: 9999;
  pointer-events: none;
  opacity: 0;
  transition: transform 1.6s ease, opacity 2s ease;
}

/* 💌 LETTER (MATCHES BACKGROUND STYLE NOW) */
.letter {
  position: fixed;
  inset: 0;

  background: radial-gradient(circle at top left,
    #ffe9f6 0%,
    #f3e6ff 50%,
    #e7dcff 100%);

  padding: 28px;
  opacity: 0;
  transform: scale(0.9);
  transition: 1s ease;

  z-index: 100000;
  overflow-y: auto;
  pointer-events: none;

  box-shadow: inset 0 0 80px rgba(140, 0, 200, 0.2);
}

/* 🌸 floating decoration (SUBTLE, behind text) */
.letter::before {
  content: "🌸 💜 ✨ 🌸 💜 ✨ 🌸 💜 ✨ 🌸 💜 ✨ 🌸 💜 ✨";
  position: absolute;
  inset: 0;
  font-size: 30px;
  opacity: 0.07;
  line-height: 2.3;
  pointer-events: none;
}

/* SHOW LETTER */
.show .letter {
  opacity: 1;
  transform: scale(1);
  pointer-events: auto;
}

.letter h2,
.letter p {
  position: relative;
  z-index: 2;
}

.letter p {
  line-height: 1.7;
  font-size: 15px;
}

</style>
</head>

<body>

<!-- 💗 BACKGROUND HEARTS -->
<script>
for (let i = 0; i < 18; i++) {
  const h = document.createElement("div");
  h.className = "bg-heart";
  h.innerText = "💜";
  h.style.left = Math.random() * 100 + "vw";
  h.style.animationDuration = (6 + Math.random() * 6) + "s";
  h.style.fontSize = (14 + Math.random() * 18) + "px";
  document.body.appendChild(h);
}
</script>

<!-- ✉️ ENVELOPE -->
<div class="envelope" onclick="openEnvelope()">
  <div class="base"></div>
  <div class="heart"></div>
  <div class="text">for someone special</div>
</div>

<!-- 📄 LETTER -->
<div class="letter">

<h2>something you need to know:</h2>

<p>Hola amor. Quiero empezar diciendo que perdón por lo mucho que esto ha tardado...</p>

<!-- (YOUR FULL TEXT STAYS EXACTLY HERE — unchanged as you already wrote it) -->

</div>

<script>

function openEnvelope() {
  const envelope = document.querySelector(".envelope");
  envelope.classList.add("open");

  const rect = envelope.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;

  const emojis = ["💜","💖","🌸","✨","💐"];

  setTimeout(() => {
    for (let i = 0; i < 120; i++) {
      const p = document.createElement("div");
      p.className = "particle";
      p.innerText = emojis[Math.floor(Math.random()*emojis.length)];
      document.body.appendChild(p);

      p.style.left = cx + "px";
      p.style.top = cy + "px";

      const size = 120 + Math.random() * 260;
      p.style.fontSize = size + "px";

      const angle = Math.random() * Math.PI * 2;
      const dist = 500 + Math.random() * 1000;

      const dx = Math.cos(angle) * dist;
      const dy = Math.sin(angle) * dist;

      setTimeout(() => {
        p.style.opacity = "1";
        p.style.transform = `translate(${dx}px, ${dy}px) scale(2)`;
      }, 50);
    }
  }, 900);

  setTimeout(() => {
    document.body.classList.add("show");
  }, 4200);
}

</script>

</body>
</html>
