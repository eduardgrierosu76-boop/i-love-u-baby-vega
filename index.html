<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<style>
  body {
    margin: 0;
    overflow: hidden;
    background: #f7e9ff;
    font-family: Arial;
  }

  audio { display: none; }

  /* ✉️ ENVELOPE */
  .envelope {
    width: 80vw;
    max-width: 320px;
    height: 200px;

    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    cursor: pointer;
    z-index: 20;
  }

  .envelope-body {
    width: 100%;
    height: 100%;
    background: white;
    border-radius: 12px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.25);
    position: absolute;
  }

  .flap {
    position: absolute;
    top: 0;
    left: 0;
    width: 0;
    height: 0;
    border-left: 160px solid transparent;
    border-right: 160px solid transparent;
    border-top: 110px solid #e8d7ff;
    transform-origin: top;
    transition: transform 1s ease;
    z-index: 3;
  }

  .open .flap {
    transform: rotateX(180deg);
  }

  .heart {
    position: absolute;
    width: 45px;
    height: 45px;
    background: #d1003f;
    top: 80px;
    left: 50%;
    transform: translateX(-50%) rotate(45deg);
    z-index: 5;
  }

  .heart::before,
  .heart::after {
    content: "";
    position: absolute;
    width: 45px;
    height: 45px;
    background: #d1003f;
    border-radius: 50%;
  }

  .heart::before { top: -22px; left: 0; }
  .heart::after { left: -22px; top: 0; }

  /* ❤️ HEARTS */
  .particle {
    position: fixed;
    opacity: 0;
    z-index: 50;
    pointer-events: none;
    transition: opacity 1s ease, transform 1.6s ease;
    filter: drop-shadow(0 12px 18px rgba(0,0,0,0.25));
  }

  /* ❤️ MESSAGE */
  .message {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 46px;
    font-weight: bold;
    color: white;
    opacity: 0;
    text-align: center;
    z-index: 60;
    text-shadow: 0 0 20px rgba(0,0,0,0.5);
  }

  /* 📄 LETTER */
  .letter {
    position: fixed;
    inset: 12px;
    background: #fffafc;
    border-radius: 14px;
    padding: 20px;
    box-sizing: border-box;
    overflow-y: auto;
    opacity: 0;
    transform: scale(0.95);
    transition: all 1.5s ease;
    box-shadow: 0 30px 80px rgba(0,0,0,0.35);
    z-index: 10;
  }

  .show .letter {
    opacity: 1;
    transform: scale(1);
  }

  .fade {
    opacity: 0 !important;
    transition: opacity 1.2s ease !important;
  }

</style>
</head>

<body>

<audio id="bgm" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_d1b5b1c3b1.mp3">
</audio>

<div id="scene">

  <div class="envelope" onclick="start()">
    <div class="envelope-body"></div>
    <div class="flap"></div>
    <div class="heart"></div>
  </div>

  <div class="message">I LOVE YOU ❤️</div>

  <div class="letter">
    <h2>My Love ❤️</h2>
    <p>This is everything I want to tell you...</p>
  </div>

</div>

<script>

let started = false;

function start() {
  if (started) return;
  started = true;

  const music = document.getElementById("bgm");
  music.play().catch(()=>{});

  document.querySelector(".envelope").classList.add("open");

  /* 💖 CONTROLLED HEART GRID (SMALL → BIG ANIMATION) */

  const cols = 4;
  const rows = 6;

  let index = 0;

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {

      const p = document.createElement("div");
      p.className = "particle";
      p.innerText = "❤️";

      document.body.appendChild(p);

      // spread evenly = NO EMPTY TOP/BOTTOM
      const x = (c + 0.5) * (100 / cols);
      const y = (r + 0.5) * (100 / rows);

      p.style.left = x + "vw";
      p.style.top = y + "vh";

      // START SMALL
      p.style.fontSize = "10px";
      p.style.transform = "scale(0)";

      // stagger animation
      setTimeout(() => {
        p.style.opacity = "1";

        // GROW BIG SMOOTHLY
        const size = 180 + Math.random() * 120;
        p.style.fontSize = size + "px";
        p.style.transform = "scale(1.2)";
      }, index * 120);

      index++;
    }
  }

  setTimeout(() => {
    document.querySelector(".message").style.opacity = "1";
  }, 500);

  setTimeout(() => {
    document.querySelector(".envelope").classList.add("fade");
    document.querySelector(".message").classList.add("fade");

    document.querySelectorAll(".particle").forEach(p => {
      p.classList.add("fade");
    });
  }, 2000);

  setTimeout(() => {
    document.getElementById("scene").classList.add("show");
  }, 3200);
}

</script>

</body>
</html>
