<!DOCTYPE html>
<html>
<head>
  <title>For You ❤️</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #f7e9ff;
      font-family: Arial;
    }

    /* ✉️ ENVELOPE */
    .envelope {
      width: 360px;
      height: 240px;
      background: white;
      border-radius: 10px;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      box-shadow: 0 15px 35px rgba(0,0,0,0.2);
      cursor: pointer;
      z-index: 20;
    }

    /* TOP FLAP (REAL OPENING EFFECT) */
    .flap {
      position: absolute;
      width: 0;
      height: 0;
      border-left: 180px solid transparent;
      border-right: 180px solid transparent;
      border-top: 120px solid #e8d7ff;
      top: 0;
      left: 0;
      transform-origin: top;
      transition: transform 1s ease;
      z-index: 25;
    }

    /* open animation */
    .open .flap {
      transform: rotateX(180deg);
    }

    /* HEART */
    .heart {
      position: absolute;
      width: 50px;
      height: 50px;
      background: #d1003f;
      top: 95px;
      left: 155px;
      transform: rotate(45deg);
      z-index: 30;
    }

    .heart::before,
    .heart::after {
      content: "";
      position: absolute;
      width: 50px;
      height: 50px;
      background: #d1003f;
      border-radius: 50%;
    }

    .heart::before { top: -25px; left: 0; }
    .heart::after { left: -25px; top: 0; }

    /* 💥 EMOJIS */
    .emoji {
      position: fixed;
      font-size: 60px;
      opacity: 0;
      transition: all 1.6s ease;
      z-index: 50;
      pointer-events: none;
    }

    /* ❤️ MESSAGE */
    .message {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 70px;
      font-weight: bold;
      color: white;
      opacity: 0;
      transition: opacity 1s ease;
      z-index: 60;
      text-shadow: 0 0 20px rgba(0,0,0,0.4);
    }

    /* 📄 LETTER */
    .letter {
      position: fixed;
      inset: 0;
      background: #fffafc;
      padding: 40px;
      opacity: 0;
      transition: opacity 1.5s ease;
      z-index: 10;
    }

    /* FADE GROUP */
    .fade-out {
      opacity: 0 !important;
      transition: opacity 1.2s ease !important;
    }

  </style>
</head>

<body>

<div class="envelope" onclick="start()">
  <div class="flap"></div>
  <div class="heart"></div>
</div>

<div class="message">I LOVE YOU ❤️</div>

<div class="letter">
  <h1>My Love ❤️</h1>
  <p>This is everything I want to tell you...</p>

  <h3>100 Things I Love About You</h3>
  <ul>
    <li>Your smile</li>
    <li>Your laugh</li>
    <li>Your kindness</li>
  </ul>
</div>

<script>
const emojis = ["❤️","🫶","💐","🌹"];
let started = false;

function start() {
  if (started) return;
  started = true;

  const env = document.querySelector(".envelope");
  env.classList.add("open");

  // create emojis
  for (let i = 0; i < 120; i++) {
    const e = document.createElement("div");
    e.className = "emoji";
    e.innerText = emojis[Math.floor(Math.random() * emojis.length)];

    document.body.appendChild(e);

    e.style.left = Math.random() * window.innerWidth + "px";
    e.style.top = Math.random() * window.innerHeight + "px";

    setTimeout(() => {
      e.style.opacity = "1";
      e.style.transform = "scale(6)";
    }, 300);
  }

  // show message
  setTimeout(() => {
    document.querySelector(".message").style.opacity = "1";
  }, 600);

  // FADE EVERYTHING TOGETHER
  setTimeout(() => {
    document.querySelectorAll(".emoji").forEach(e => {
      e.classList.add("fade-out");
    });

    document.querySelector(".message").classList.add("fade-out");
  }, 1800);

  // reveal letter AFTER fade
  setTimeout(() => {
    document.querySelector(".letter").style.opacity = "1";
  }, 3000);
}
</script>

</body>
</html>
