<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial;
  background: #120018;
  transition: background 2s ease;
}

/* 🌌 GALAXY BACKGROUND */
.galaxy {
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at 20% 20%, #2b0a3d, transparent 40%),
              radial-gradient(circle at 80% 70%, #3a0f5c, transparent 45%),
              radial-gradient(circle at center, #0d0014, #000);
  animation: drift 12s infinite alternate ease-in-out;
  z-index: 0;
}

@keyframes drift {
  0% { transform: scale(1); filter: hue-rotate(0deg); }
  100% { transform: scale(1.08); filter: hue-rotate(20deg); }
}

/* 💗 HEARTS */
.bg-heart {
  position: fixed;
  z-index: 1;
  pointer-events: none;
  color: rgba(255, 0, 80, 0.25);
  animation: floatUp linear infinite;
}

@keyframes floatUp {
  from { transform: translateY(100vh); }
  to { transform: translateY(-10vh); }
}

/* 🎥 PARALLAX STAGE */
.stage {
  position: absolute;
  inset: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  transition: transform 0.2s ease;
}

/* ✉️ ENVELOPE (ORIGAMI FEEL) */
.envelope {
  width: 340px;
  height: 220px;
  position: relative;
  cursor: pointer;

  transform-style: preserve-3d;
  animation: floatBreath 3s ease-in-out infinite;
}

@keyframes floatBreath {
  0%,100% { transform: translateY(0) rotateX(0deg); }
  50% { transform: translateY(-8px) rotateX(2deg); }
}

/* BASE */
.base {
  position: absolute;
  width: 100%;
  height: 100%;
  background: #fff;
  border-radius: 8px;
  box-shadow: 0 30px 80px rgba(0,0,0,0.4);
}

/* FLAPS (REAL ORIGAMI OPENING) */
.flap {
  position: absolute;
  width: 100%;
  height: 60%;
  top: 0;
  background: #fff;
  clip-path: polygon(0 0, 100% 0, 50% 100%);
  transform-origin: top;
  transition: transform 1.2s cubic-bezier(.77,0,.18,1);
  border-bottom: 2px solid #ead7df;
}

.left-flap, .right-flap, .bottom-flap {
  position: absolute;
  background: #f7f7f7;
  z-index: 1;
}

.left-flap {
  width: 50%; height: 100%;
  left: 0;
  clip-path: polygon(0 0, 100% 50%, 0 100%);
}

.right-flap {
  width: 50%; height: 100%;
  right: 0;
  clip-path: polygon(100% 0, 0 50%, 100% 100%);
}

.bottom-flap {
  width: 100%;
  height: 55%;
  bottom: 0;
  clip-path: polygon(0 0, 50% 100%, 100% 0);
}

.open .flap {
  transform: rotateX(-180deg);
}

/* ❤️ HEART */
.heart {
  position: absolute;
  top: 55%;
  left: 50%;
  transform: translate(-50%, -50%) rotate(45deg);
  width: 55px;
  height: 55px;
  background: #d1003f;
  animation: pulse 1.1s infinite;
  z-index: 5;
}

.heart::before,
.heart::after {
  content: "";
  position: absolute;
  width: 55px;
  height: 55px;
  background: #d1003f;
  border-radius: 50%;
}

.heart::before { top: -27px; }
.heart::after { left: -27px; }

@keyframes pulse {
  0% { transform: translate(-50%, -50%) rotate(45deg) scale(1); }
  50% { transform: translate(-50%, -50%) rotate(45deg) scale(1.25); }
  100% { transform: translate(-50%, -50%) rotate(45deg) scale(1); }
}

/* TEXT */
.text {
  position: absolute;
  bottom: 14px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 14px;
  color: #7a4a6a;
}

/* 💥 PARTICLES */
.particle {
  position: fixed;
  z-index: 9999;
  pointer-events: none;
  opacity: 0;
  transition: transform 2.4s ease, opacity 2.6s ease;
}

/* 📄 LETTER (REAL PAPER DEPTH) */
.letter {
  position: fixed;
  inset: 0;
  background: #fffaf5;
  padding: 28px;

  opacity: 0;
  transform: translateY(60px) scale(0.92);
  transition: 1.8s cubic-bezier(.2,.8,.2,1);

  z-index: 100000;

  overflow-y: auto;
  -webkit-overflow-scrolling: touch;

  box-shadow: 0 -30px 120px rgba(0,0,0,0.6);
}

.show .letter {
  opacity: 1;
  transform: translateY(0) scale(1);
}
</style>
</head>

<body>

<div class="galaxy"></div>

<div class="stage">

<!-- ✉️ ENVELOPE -->
<div class="envelope" id="env" onclick="openEnvelope()">
  <div class="base"></div>
  <div class="bottom-flap"></div>
  <div class="left-flap"></div>
  <div class="right-flap"></div>
  <div class="flap"></div>
  <div class="heart"></div>
  <div class="text">for someone special</div>
</div>

</div>

<!-- 📄 LETTER -->
<div class="letter" id="letter">
<h2>something you need to know:</h2>
<p id="typed"></p>
</div>

<script>

/* YOUR TEXT (UNCHANGED) */
const text = `Hola amor. Quiero empezar diciendo que perdón por lo mucho que esto ha tardado. No sé cómo programar cosas ni mucho español, así que si no tiene sentido, perdón. Pero hice esto para agradecerte por todo, gracias por estar aquí cuando más me necesitaba, gracias por escucharme, gracias por escribirme todos los días, gracias por existir.

Antes de conocerte pensaba que no iba a necesitar a nadie durante mucho tiempo, solo quería estar solo, pero que hayas llegado a mi vida fue lo mejor que me ha pasado. No esperaba estar pensando en ti cada segundo del día, o despertarme solo para sonreír cuando me escribías. Haces que mis días sean mejores cada día, y espero que yo también haga los tuyos mejores.

He estado perdido por un tiempo y hemos hablado durante tanto tiempo y aún así no sé qué quiero hacer con mi futuro, pero sí sé una cosa con seguridad: te amo, y sin importar cómo se vea mi futuro, quiero que sea contigo. Quiero despertarme cada día contigo en mis brazos, quiero estar ahí para ti cuando más me necesites, quiero saber todo sobre ti, quiero hacer todo contigo, quiero envejecer contigo, porque te amo.

Y tal vez no lo demuestre lo suficiente, pero me importas, y siempre quiero que sepas que no importa lo que pase, siempre voy a estar aquí para ti. Cuando solo veas oscuridad, siempre voy a estar aquí para mostrarte la luz.

Debería haber hecho esta carta hace mucho tiempo, pero nunca tuve suficientes palabras para describir lo mucho que significas para mí, y aún no las tengo. Pero eres perfecta, mi amor. Sueño contigo cada noche. Si Dios creó la perfección, eres tú.

Y aunque no tenga suficientes palabras para decir cuánto te amo, aquí tienes 100 de las millones de cosas que amo de ti:`;

/* 🎬 OPEN */
function openEnvelope() {

  navigator.vibrate?.([200,100,300,100,500]); // 💓 heartbeat pattern

  document.body.classList.add("beat","night");

  const env = document.getElementById("env");
  env.classList.add("open");

  const rect = env.getBoundingClientRect();
  const cx = rect.left + rect.width/2;
  const cy = rect.top + rect.height/2;

  const emojis = ["❤️","💖","💘","💞","💋"];

  setTimeout(() => {

    for (let i = 0; i < 70; i++) {
      const p = document.createElement("div");
      p.className = "particle";
      p.innerText = emojis[Math.floor(Math.random()*emojis.length)];
      document.body.appendChild(p);

      p.style.left = cx + "px";
      p.style.top = cy + "px";

      const dist = 700 + Math.random()*900;
      const angle = Math.random()*Math.PI*2;

      const dx = Math.cos(angle)*dist;
      const dy = Math.sin(angle)*dist;

      setTimeout(() => {
        p.style.opacity = "1";
        p.style.transform = `translate(${dx}px,${dy}px) scale(2)`;
      }, 80);
    }

  }, 900);

  setTimeout(() => {
    env.style.opacity = "0";
    typeText();
  }, 1800);

  setTimeout(() => {
    document.getElementById("letter").classList.add("show");
  }, 4200);
}

/* ⌨️ TYPEWRITER */
function typeText() {
  let i = 0;
  const el = document.getElementById("typed");

  function t() {
    if (i < text.length) {
      el.innerHTML += text[i];
      i++;
      setTimeout(t, 6);
    }
  }
  t();
}

/* 🎥 CURSOR PARALLAX */
document.addEventListener("mousemove", e => {
  const x = (e.clientX / window.innerWidth - 0.5) * 10;
  const y = (e.clientY / window.innerHeight - 0.5) * 10;
  document.querySelector(".stage").style.transform =
    `translate(${x}px, ${y}px)`;
});

</script>

</body>
</html>
