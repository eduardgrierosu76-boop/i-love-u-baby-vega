<!DOCTYPE html>
<html>
<head>
  <title>For You ❤️</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #ffe4ec;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial;
    }

    .container {
      text-align: center;
    }

    /* ENVELOPE BASE */
    .envelope {
      position: relative;
      width: 300px;
      height: 200px;
      background: #ff6f91;
      cursor: pointer;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      border-radius: 6px;
      overflow: hidden;
    }

    /* FLAP (TOP TRIANGLE) */
    .flap {
      position: absolute;
      top: 0;
      left: 0;
      width: 0;
      height: 0;
      border-left: 150px solid transparent;
      border-right: 150px solid transparent;
      border-top: 100px solid #ff4f73;
      transform-origin: top;
      transition: transform 0.6s ease;
      z-index: 3;
    }

    /* LETTER */
    .letter {
      position: absolute;
      bottom: 0;
      left: 10px;
      width: 280px;
      height: 0;
      background: white;
      overflow: hidden;
      transition: 0.8s ease;
      border-radius: 5px;
      padding: 0 15px;
      box-sizing: border-box;
      z-index: 1;
    }

    /* OPEN STATE */
    .open .flap {
      transform: rotateX(180deg);
    }

    .open .letter {
      height: 320px;
      padding: 15px;
    }

    ul {
      text-align: left;
    }

    .hint {
      margin-top: 20px;
    }
  </style>
</head>

<body>

<div class="container">
  <div class="envelope" onclick="openLetter(this)">
    <div class="flap"></div>

    <div class="letter">
      <h2>My Love 💖</h2>
      <p>This is everything I want you to know...</p>

      <h3>100 Things I Love About You</h3>
      <ul>
        <li>Your smile</li>
        <li>Your laugh</li>
        <li>The way you care</li>
      </ul>
    </div>
  </div>

  <p class="hint">Click the envelope 💌</p>
</div>

<script>
function openLetter(el) {
  el.classList.toggle("open");
}
</script>

</body>
</html>
