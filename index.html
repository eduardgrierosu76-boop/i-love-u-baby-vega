<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<style>
  body {
    margin: 0;
    overflow: hidden;
    background: #f7e9ff;
    font-family: Arial;
  }

  audio { display: none; }

  /* 💗 BACKGROUND HEARTS */
  .bg-heart {
    position: fixed;
    color: rgba(255, 0, 80, 0.25);
    font-size: 20px;
    z-index: 0;
    pointer-events: none;
    animation: floatUp linear infinite;
  }

  @keyframes floatUp {
    from { transform: translateY(100vh); }
    to { transform: translateY(-10vh); }
  }

  /* ✉️ ENVELOPE */
  .envelope {
    width: 80vw;
    max-width: 320px;
    height: 200px;

    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);

    cursor: pointer;
    z-index: 100;
  }

  .body {
    width: 100%;
    height: 100%;
    background: white;
    border-radius: 10px;
    position: absolute;
    box-shadow: 0 20px 40px rgba(0,0,0,0.25);
  }

  /* fold lines */
  .body::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background:
      linear-gradient(to bottom right, transparent 49%, #ddd 50%, transparent 51%),
      linear-gradient(to bottom left, transparent 49%, #ddd 50%, transparent 51%);
    opacity: 0.6;
  }

  /* 🔺 FLAP (REAL OPENING) */
  .flap {
    position: absolute;
    width: 100%;
    height: 100%;
    background: white;
    clip-path: polygon(0 0, 100% 0, 50% 55%);
    transform-origin: top;
    transform: rotateX(0deg);
    transition: transform 1s ease;
    z-index: 3;
  }

  .open .flap {
    transform: rotateX(-180deg);
  }

  /* ❤️ HEART */
  .center-heart {
    position: absolute;
    top: 55%;
    left: 50%;
    transform: translate(-50%, -50%) rotate(45deg);
    width: 45px;
    height: 45px;
    background: #d1003f;
    z-index: 5;
  }

  .center-heart::before,
  .center-heart::after {
    content: "";
    position: absolute;
    width: 45px;
    height: 45px;
    background: #d1003f;
    border-radius: 50%;
  }

  .center-heart::before { top: -22px; left: 0; }
  .center-heart::after { left: -22px; top: 0; }

  /* 💥 EMOJIS */
  .particle {
    position: fixed;
    z-index: 20;
    pointer-events: none;
    opacity: 0;
    transition: transform 1.5s ease, opacity 2s ease;
  }

  /* 📄 LETTER */
  .letter {
    position: fixed;
    inset: 12px;
    background: #fffafc;
    border-radius: 14px;
    padding: 20px;

    opacity: 0;
    transform: scale(0.85);

    transition: all 1.2s ease;

    box-shadow: 0 30px 80px rgba(0,0,0,0.35);
    z-index: 999;
    pointer-events: none;
  }

  .show .letter {
    opacity: 1;
    transform: scale(1);
  }

</style>
</head>

<body>

<audio id="bgm" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_d1b5b1c3b1.mp3">
</audio>

<!-- 💗 BACKGROUND HEARTS -->
<script>
for (let i = 0; i < 18; i++) {
  const h = document.createElement("div");
  h.className = "bg-heart";
  h.innerText = "❤️";

  h.style.left = Math.random() * 100 + "vw";
  h.style.animationDuration = (6 + Math.random() * 6) + "s";
  h.style.fontSize = (18 + Math.random() * 20) + "px";

  document.body.appendChild(h);
}
</script>

<!-- ✉️ ENVELOPE -->
<div class="envelope" onclick="start()">
  <div class="body"></div>
  <div class="flap"></div>
  <div class="center-heart"></div>
</div>

<!-- 📄 LETTER -->
<div class="letter">
  <h2>My Love ❤️</h2>
  <p>This is everything I want to tell you...</p>
</div>

<script>

function start() {

  const music = document.getElementById("bgm");
  music.play().catch(()=>{});

  const envelope = document.querySelector(".envelope");
  envelope.classList.add("open");

  const rect = envelope.getBoundingClientRect();

  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;

  const emojis = ["❤️","💋","💖","💞","❤️"];

  /* 💥 STEP 1: POUR OUT EMOJIS */
  for (let i = 0; i < 80; i++) {

    const p = document.createElement("div");
    p.className = "particle";
    p.innerText = emojis[Math.floor(Math.random()*emojis.length)];

    document.body.appendChild(p);

    /* start INSIDE envelope */
    p.style.left = cx + "px";
    p.style.top = cy + "px";

    const size = 120 + Math.random() * 240;
    p.style.fontSize = size + "px";

    const angle = Math.random() * Math.PI * 2;
    const dist = 300 + Math.random() * 700;

    const dx = Math.cos(angle) * dist;
    const dy = Math.sin(angle) * dist;

    setTimeout(() => {
      p.style.opacity = "1";
      p.style.transform = `translate(${dx}px, ${dy}px) scale(1.6)`;
    }, 100);
  }

  /* 🌫️ STEP 2: FADE EMOJIS */
  setTimeout(() => {
    document.querySelectorAll(".particle").forEach(p => {
      p.style.opacity = "0";
    });
  }, 2000);

  /* 📄 STEP 3: SHOW LETTER */
  setTimeout(() => {
    document.body.classList.add("show");
  }, 3200);

}

</script>

</body>
</html>
