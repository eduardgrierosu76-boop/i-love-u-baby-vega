<!DOCTYPE html>
<html>
<head>
  <title>For You ❤️</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #f7e9ff;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial;
      overflow: hidden;
    }

    /* 🌸 BACKGROUND HEARTS (SUBTLE) */
    .bg-heart {
      position: absolute;
      background: #ff4f7b;
      opacity: 0.15;
      transform: rotate(45deg);
      animation: float 6s infinite ease-in-out;
    }

    .bg-heart::before,
    .bg-heart::after {
      content: "";
      position: absolute;
      background: #ff4f7b;
      border-radius: 50%;
    }

    @keyframes float {
      0% { transform: translateY(0) rotate(45deg); }
      50% { transform: translateY(-20px) rotate(45deg); }
      100% { transform: translateY(0) rotate(45deg); }
    }

    .h1 { width: 60px; height: 60px; top: 10%; left: 15%; }
    .h2 { width: 35px; height: 35px; top: 70%; left: 80%; }
    .h3 { width: 45px; height: 45px; top: 30%; left: 75%; }

    .h1::before, .h1::after,
    .h2::before, .h2::after,
    .h3::before, .h3::after {
      width: 100%; height: 100%;
    }

    /* ENVELOPE */
    .scene {
      text-align: center;
      z-index: 2;
    }

    .envelope {
      position: relative;
      width: 360px;
      height: 240px;
      background: #ffffff;
      border-radius: 10px;
      cursor: pointer;
      box-shadow: 0 15px 35px rgba(0,0,0,0.2);
      overflow: hidden;
    }

    .flap {
      position: absolute;
      width: 0;
      height: 0;
      border-left: 180px solid transparent;
      border-right: 180px solid transparent;
      border-top: 130px solid #e8d7ff;
      top: 0;
      left: 0;
      transform-origin: top;
      transition: 0.7s ease;
      z-index: 3;
    }

    /* HEART ON ENVELOPE */
    .heart {
      position: absolute;
      width: 55px;
      height: 55px;
      background: #d1003f;
      top: 92px;
      left: 152px;
      transform: rotate(45deg);
      z-index: 5;
      transition: opacity 0.4s ease;
    }

    .heart::before,
    .heart::after {
      content: "";
      position: absolute;
      width: 55px;
      height: 55px;
      background: #d1003f;
      border-radius: 50%;
    }

    .heart::before { top: -27px; left: 0; }
    .heart::after { left: -27px; top: 0; }

    /* PAPER (A4 STYLE) */
    .paper {
      position: absolute;
      width: 300px;
      height: 420px;
      background: #fffafc;
      left: 30px;
      top: 240px;
      border-radius: 8px;
      padding: 18px;
      box-sizing: border-box;
      transition: all 0.9s ease;
      z-index: 2;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    }

    /* STAGE 1 */
    .stage1 .flap {
      transform: rotateX(180deg);
    }

    .stage1 .paper {
      top: 20px;
    }

    /* STAGE 2 → A4 FINAL (NOT FULL SCREEN) */
    .stage2 .paper {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 70vw;
      max-width: 600px;
      height: 85vh;
    }

    /* HEART DISAPPEARS */
    .stage1 .heart,
    .stage2 .heart {
      opacity: 0;
    }

    ul {
      text-align: left;
    }

    h2 {
      margin-top: 0;
    }
  </style>
</head>

<body>

<!-- 🌸 BACKGROUND HEARTS -->
<div class="bg-heart h1"></div>
<div class="bg-heart h2"></div>
<div class="bg-heart h3"></div>

<div class="scene">
  <div class="envelope" id="env" onclick="openEnvelope()">

    <div class="flap"></div>
    <div class="heart"></div>

    <div class="paper">
      <h2>My Love ❤️</h2>
      <p>This is everything I want you to know...</p>

      <h3>100 Things I Love About You</h3>
      <ul>
        <li>Your smile</li>
        <li>Your laugh</li>
        <li>Your kindness</li>
      </ul>
    </div>

  </div>
</div>

<script>
let stage = 0;

function openEnvelope() {
  const env = document.getElementById("env");

  if (stage === 0) {
    env.classList.add("stage1");
    stage = 1;
  } else if (stage === 1) {
    env.classList.add("stage2");
    stage = 2;
  }
}
</script>

</body>
</html>
