<!DOCTYPE html>
<html>
<head>
  <title>For You ❤️</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #f7e9ff;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial;
      overflow: hidden;
    }

    /* 🌸 BACKGROUND HEARTS (VISIBLE + SIMPLE) */
    .heart-bg {
      position: absolute;
      width: 60px;
      height: 60px;
      background: #ff4f7b;
      transform: rotate(45deg);
      opacity: 0.2;
      animation: float 6s infinite ease-in-out;
    }

    .heart-bg::before,
    .heart-bg::after {
      content: "";
      position: absolute;
      width: 60px;
      height: 60px;
      background: #ff4f7b;
      border-radius: 50%;
    }

    @keyframes float {
      0% { transform: translateY(0) rotate(45deg); }
      50% { transform: translateY(-20px) rotate(45deg); }
      100% { transform: translateY(0) rotate(45deg); }
    }

    .h1 { top: 10%; left: 15%; }
    .h2 { top: 70%; left: 80%; width: 40px; height: 40px; }
    .h3 { top: 30%; left: 75%; width: 50px; height: 50px; }

    /* ENVELOPE */
    .envelope {
      width: 360px;
      height: 240px;
      background: white;
      border-radius: 12px;
      position: relative;
      box-shadow: 0 15px 35px rgba(0,0,0,0.2);
      cursor: pointer;
      z-index: 2;
    }

    .heart {
      position: absolute;
      width: 50px;
      height: 50px;
      background: red;
      top: 95px;
      left: 155px;
      transform: rotate(45deg);
      z-index: 5;
    }

    .heart::before,
    .heart::after {
      content: "";
      position: absolute;
      width: 50px;
      height: 50px;
      background: red;
      border-radius: 50%;
    }

    .heart::before { top: -25px; left: 0; }
    .heart::after { left: -25px; top: 0; }

    /* PAPER (A4 REAL SIZE FEEL) */
    .paper {
      position: fixed;
      width: 210mm;
      height: 297mm;
      max-width: 90vw;
      max-height: 90vh;

      background: #fffafc;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);

      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.25);

      transition: 0.8s ease;
      z-index: 10;
    }

    .open .paper {
      transform: translate(-50%, -50%) scale(1);
    }

    .open .envelope {
      opacity: 0;
      transform: scale(0.8);
    }

    .open .heart {
      opacity: 0;
    }

  </style>
</head>

<body>

<!-- 🌸 hearts -->
<div class="heart-bg h1"></div>
<div class="heart-bg h2"></div>
<div class="heart-bg h3"></div>

<div id="container">

  <div class="envelope" onclick="openLetter()">
    <div class="heart"></div>
  </div>

  <div class="paper">
    <h2>My Love ❤️</h2>
    <p>This is everything I want to say to you...</p>

    <h3>100 Things I Love</h3>
    <ul>
      <li>Your smile</li>
      <li>Your laugh</li>
      <li>Your kindness</li>
    </ul>
  </div>

</div>

<script>
function openLetter() {
  document.getElementById("container").classList.add("open");
}
</script>

</body>
</html>
