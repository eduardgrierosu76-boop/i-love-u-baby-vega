<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<style>
  body {
    margin: 0;
    overflow: hidden;
    background: #f7e9ff;
    font-family: Arial;
  }

  /* ✉️ ENVELOPE */
  .envelope {
    width: 80vw;
    max-width: 320px;
    height: 200px;

    position: absolute;
    left: 50%;
    top: 110%;
    transform: translateX(-50%);

    cursor: pointer;
    z-index: 50;

    animation: slideUp 1.2s ease forwards;
  }

  @keyframes slideUp {
    to {
      top: 50%;
      transform: translate(-50%, -50%);
    }
  }

  /* 🧱 BODY (REAL ENVELOPE BASE) */
  .body {
    width: 100%;
    height: 100%;
    background: white;
    position: absolute;
    border-radius: 6px;
    box-shadow: 0 25px 50px rgba(0,0,0,0.25);

    /* envelope X fold lines */
    background-image:
      linear-gradient(135deg, transparent 49%, #ddd 50%, transparent 51%),
      linear-gradient(225deg, transparent 49%, #ddd 50%, transparent 51%);
  }

  /* 🔺 FLAP (REAL OPENING LID) */
  .flap {
    position: absolute;
    width: 100%;
    height: 50%;
    top: 0;
    left: 0;

    background: white;
    clip-path: polygon(0 0, 100% 0, 50% 100%);
    transform-origin: top;
    transition: transform 0.9s ease;

    z-index: 3;
    box-shadow: 0 10px 15px rgba(0,0,0,0.1);
  }

  .open .flap {
    transform: rotateX(-180deg);
  }

  /* ❤️ HEART */
  .center-heart {
    position: absolute;
    top: 42%;
    left: 50%;
    transform: translate(-50%, -50%) rotate(45deg);
    width: 45px;
    height: 45px;
    background: #d1003f;
    z-index: 5;

    animation: pulse 1.2s infinite ease-in-out;
  }

  @keyframes pulse {
    0%   { transform: translate(-50%, -50%) rotate(45deg) scale(1); }
    50%  { transform: translate(-50%, -50%) rotate(45deg) scale(1.2); }
    100% { transform: translate(-50%, -50%) rotate(45deg) scale(1); }
  }

  .center-heart::before,
  .center-heart::after {
    content: "";
    position: absolute;
    width: 45px;
    height: 45px;
    background: #d1003f;
    border-radius: 50%;
  }

  .center-heart::before { top: -22px; left: 0; }
  .center-heart::after { left: -22px; top: 0; }

  /* 📝 TEXT (LOWERED) */
  .subtitle {
    position: absolute;
    top: 78%; /* LOWER than before */
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 14px;
    color: #7a4a6a;
    z-index: 6;
    pointer-events: none;
  }

  /* 💥 EMOJIS */
  .particle {
    position: fixed;
    z-index: 9999;
    pointer-events: none;
    opacity: 0;
    transition: transform 1.6s ease, opacity 2s ease;
  }

  /* 📄 LETTER */
  .letter {
    position: fixed;
    inset: 12px;
    background: #fffafc;
    border-radius: 14px;
    padding: 20px;

    opacity: 0;
    transform: scale(0.85);
    transition: 1.2s ease;

    z-index: 100000;
    pointer-events: none;
  }

  .show .letter {
    opacity: 1;
    transform: scale(1);
  }

</style>
</head>

<body>

<!-- ✉️ ENVELOPE -->
<div class="envelope" onclick="start()">

  <div class="body"></div>
  <div class="flap"></div>

  <div class="center-heart"></div>

  <div class="subtitle">for someone special</div>

</div>

<!-- 📄 LETTER -->
<div class="letter">
  <h2>My Love ❤️</h2>
  <p>This is everything I want to tell you...</p>
</div>

<script>

function start() {

  const envelope = document.querySelector(".envelope");
  envelope.classList.add("open");

  const rect = envelope.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;

  const emojis = ["❤️","💋","💖","💞","💘"];

  for (let i = 0; i < 100; i++) {

    const p = document.createElement("div");
    p.className = "particle";
    p.innerText = emojis[Math.floor(Math.random()*emojis.length)];

    document.body.appendChild(p);

    p.style.left = cx + "px";
    p.style.top = cy + "px";

    const size = 140 + Math.random() * 260;
    p.style.fontSize = size + "px";

    const angle = Math.random() * Math.PI * 2;
    const dist = 400 + Math.random() * 900;

    const dx = Math.cos(angle) * dist;
    const dy = Math.sin(angle) * dist;

    setTimeout(() => {
      p.style.opacity = "1";
      p.style.transform = `translate(${dx}px, ${dy}px) scale(1.8)`;
    }, 80);
  }

  setTimeout(() => {
    envelope.style.opacity = "0";
  }, 900);

  setTimeout(() => {
    document.querySelectorAll(".particle").forEach(p => {
      p.style.opacity = "0";
    });
  }, 2200);

  setTimeout(() => {
    document.body.classList.add("show");
  }, 3200);

}

</script>

</body>
</html>
