<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<style>
  body {
    margin: 0;
    overflow: hidden;
    background: #f7e9ff;
    font-family: Arial;
  }

  audio { display: none; }

  /* ✉️ ENVELOPE (CLICK SAFE) */
  .envelope {
    width: 80vw;
    max-width: 320px;
    height: 200px;

    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);

    cursor: pointer;
    z-index: 999; /* IMPORTANT FIX */

    pointer-events: auto; /* IMPORTANT FIX */
  }

  .envelope-body {
    width: 100%;
    height: 100%;
    background: white;
    border-radius: 12px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.25);
    position: absolute;
  }

  .flap {
    position: absolute;
    top: 0;
    left: 0;
    width: 0;
    height: 0;
    border-left: 160px solid transparent;
    border-right: 160px solid transparent;
    border-top: 110px solid #e8d7ff;
    transform-origin: top;
    transition: transform 1s ease;
    z-index: 3;
  }

  .open .flap {
    transform: rotateX(180deg);
  }

  .heart {
    position: absolute;
    width: 45px;
    height: 45px;
    background: #d1003f;
    top: 80px;
    left: 50%;
    transform: translateX(-50%) rotate(45deg);
    z-index: 5;
  }

  .heart::before,
  .heart::after {
    content: "";
    position: absolute;
    width: 45px;
    height: 45px;
    background: #d1003f;
    border-radius: 50%;
  }

  .heart::before { top: -22px; left: 0; }
  .heart::after { left: -22px; top: 0; }

  /* ❤️ HEARTS */
  .particle {
    position: fixed;
    opacity: 0;
    z-index: 50;
    pointer-events: none;
    transition: transform 1.6s ease, opacity 1.2s ease;
    filter: drop-shadow(0 12px 18px rgba(0,0,0,0.25));
  }

  /* 💌 LETTER */
  .letter {
    position: fixed;
    inset: 10px;
    background: #fffafc;
    border-radius: 14px;
    padding: 20px;
    box-sizing: border-box;

    opacity: 0;
    transform: scale(0.9);

    transition: all 1.2s ease;

    box-shadow: 0 30px 80px rgba(0,0,0,0.35);

    z-index: 999;
    pointer-events: none;
  }

  .show-letter .letter {
    opacity: 1;
    transform: scale(1);
    pointer-events: auto;
  }

  .message {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 46px;
    font-weight: bold;
    color: white;
    opacity: 0;
    text-align: center;
    z-index: 60;
  }

  .fade {
    opacity: 0 !important;
    transition: opacity 1.2s ease !important;
  }

</style>
</head>

<body>

<audio id="bgm" loop>
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_d1b5b1c3b1.mp3">
</audio>

<!-- ✉️ CLICKABLE ENVELOPE -->
<div class="envelope" id="envelope" onclick="start()">
  <div class="envelope-body"></div>
  <div class="flap"></div>
  <div class="heart"></div>
</div>

<div class="message">I LOVE YOU ❤️</div>

<div class="letter">
  <h2>My Love ❤️</h2>
  <p>This is everything I want to tell you...</p>
</div>

<script>

let started = false;

function start() {
  if (started) return;
  started = true;

  const music = document.getElementById("bgm");
  music.play().catch(()=>{});

  document.getElementById("envelope").classList.add("open");

  const rect = document.getElementById("envelope").getBoundingClientRect();

  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;

  for (let i = 0; i < 45; i++) {

    const p = document.createElement("div");
    p.className = "particle";
    p.innerText = "❤️";

    document.body.appendChild(p);

    p.style.left = cx + "px";
    p.style.top = cy + "px";

    const size = 140 + Math.random() * 180;
    p.style.fontSize = size + "px";

    const angle = Math.random() * Math.PI * 2;
    const dist = 250 + Math.random() * 500;

    const dx = Math.cos(angle) * dist;
    const dy = Math.sin(angle) * dist;

    setTimeout(() => {
      p.style.opacity = "1";
      p.style.transform = `translate(${dx}px, ${dy}px) scale(1.4)`;
    }, 50);
  }

  setTimeout(() => {
    document.querySelector(".message").style.opacity = "1";
  }, 500);

  setTimeout(() => {
    document.querySelectorAll(".particle").forEach(p => p.classList.add("fade"));
    document.querySelector(".message").classList.add("fade");
    document.getElementById("envelope").classList.add("fade");
  }, 1800);

  setTimeout(() => {
    document.body.classList.add("show-letter");
  }, 2800);
}

</script>

</body>
</html>
