<!DOCTYPE html>
<html>
<head>
  <title>For You ❤️</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #ffe4ec;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial;
    }

    .scene {
      text-align: center;
    }

    /* ENVELOPE (PURE WHITE) */
    .envelope {
      position: relative;
      width: 340px;
      height: 220px;
      background: #ffffff;
      border-radius: 10px;
      cursor: pointer;
      box-shadow: 0 12px 30px rgba(0,0,0,0.2);
      overflow: hidden;
    }

    /* FLAP (ALSO WHITE - NO PINK ANYWHERE) */
    .flap {
      position: absolute;
      width: 0;
      height: 0;
      border-left: 170px solid transparent;
      border-right: 170px solid transparent;
      border-top: 120px solid #ffffff;
      top: 0;
      left: 0;
      transform-origin: top;
      transition: 0.6s ease;
      z-index: 3;
      box-shadow: inset 0 -2px 0 rgba(0,0,0,0.05);
    }

    /* HEART (ONLY FRONT DECORATION) */
    .heart {
      position: absolute;
      width: 50px;
      height: 50px;
      background: #e60026;
      top: 85px;
      left: 145px;
      transform: rotate(45deg);
      z-index: 4;
      transition: opacity 0.3s ease;
    }

    .heart::before,
    .heart::after {
      content: "";
      position: absolute;
      width: 50px;
      height: 50px;
      background: #e60026;
      border-radius: 50%;
    }

    .heart::before { top: -25px; left: 0; }
    .heart::after { left: -25px; top: 0; }

    /* PAPER (COMPLETELY HIDDEN AT START) */
    .paper {
      position: absolute;
      width: 280px;
      height: 380px;
      background: white;
      left: 30px;
      top: 220px; /* fully INSIDE envelope */
      border-radius: 8px;
      padding: 15px;
      box-sizing: border-box;
      transition: 0.8s ease;
      z-index: 1;
      overflow: hidden;
    }

    /* STAGE 1: OPEN FLAP + START PAPER EXIT */
    .stage1 .flap {
      transform: rotateX(180deg);
    }

    .stage1 .paper {
      top: 40px; /* peeking out */
    }

    /* STAGE 2: FULL PAPER OUT */
    .stage2 .paper {
      top: -150px;
    }

    /* HEART DISAPPEARS ONLY WHEN FULL OPEN */
    .stage2 .heart {
      opacity: 0;
    }

    h2 {
      margin: 0;
    }

    ul {
      text-align: left;
      padding-left: 15px;
    }

    .hint {
      margin-top: 15px;
    }
  </style>
</head>

<body>

<div class="scene">
  <div class="envelope" id="env" onclick="openEnvelope()">

    <div class="flap"></div>
    <div class="heart"></div>

    <div class="paper">
      <h2>My Love ❤️</h2>
      <p>This is everything I want you to know...</p>

      <h3>100 Things I Love</h3>
      <ul>
        <li>Your smile</li>
        <li>Your laugh</li>
        <li>Your kindness</li>
      </ul>
    </div>

  </div>

  <p class="hint">Click once → open, click again → reveal 💌</p>
</div>

<script>
let stage = 0;

function openEnvelope() {
  const env = document.getElementById("env");

  if (stage === 0) {
    env.classList.add("stage1");
    stage = 1;
  } else if (stage === 1) {
    env.classList.add("stage2");
    stage = 2;
  }
}
</script>

</body>
</html>
