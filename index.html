<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: #f7e9ff;
  font-family: Arial;
}

/* 💗 BACKGROUND HEARTS */
.bg-heart {
  position: fixed;
  z-index: 1;
  pointer-events: none;
  color: rgba(255, 0, 80, 0.25);
  font-size: 18px;
  animation: floatUp linear infinite;
}

@keyframes floatUp {
  from { transform: translateY(100vh); }
  to { transform: translateY(-10vh); }
}

/* 💌 CENTER CARD (START STATE) */
.card {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  z-index: 50;
  text-align: center;
  cursor: pointer;
}

/* 💖 PULSING HEART */
.heart {
  width: 60px;
  height: 60px;
  background: #d1003f;
  margin: 0 auto;
  transform: rotate(45deg);
  animation: pulse 1.2s infinite;
}

.heart::before,
.heart::after {
  content: "";
  position: absolute;
  width: 60px;
  height: 60px;
  background: #d1003f;
  border-radius: 50%;
}

.heart::before { top: -30px; left: 0; }
.heart::after { left: -30px; top: 0; }

@keyframes pulse {
  0% { transform: rotate(45deg) scale(1); }
  50% { transform: rotate(45deg) scale(1.2); }
  100% { transform: rotate(45deg) scale(1); }
}

/* 📝 TEXT */
.text {
  margin-top: 20px;
  font-size: 14px;
  color: #7a4a6a;
}

/* 💥 EMOJIS */
.particle {
  position: fixed;
  z-index: 9999;
  pointer-events: none;
  opacity: 0;
  transition: transform 1.6s ease, opacity 2s ease;
}

/* 📄 LETTER */
.letter {
  position: fixed;
  inset: 12px;
  background: #fffafc;
  border-radius: 14px;
  padding: 20px;

  opacity: 0;
  transform: scale(0.85);
  transition: 1.2s ease;

  z-index: 100000;
  pointer-events: none;
}

.show .letter {
  opacity: 1;
  transform: scale(1);
}

</style>
</head>

<body>

<!-- 💗 BACKGROUND HEARTS -->
<script>
for (let i = 0; i < 20; i++) {
  const h = document.createElement("div");
  h.className = "bg-heart";
  h.innerText = "❤️";

  h.style.left = Math.random() * 100 + "vw";
  h.style.animationDuration = (6 + Math.random() * 6) + "s";
  h.style.fontSize = (14 + Math.random() * 18) + "px";

  document.body.appendChild(h);
}
</script>

<!-- 💌 MAIN CARD -->
<div class="card" onclick="openCard()">
  <div class="heart"></div>
  <div class="text">for someone special</div>
</div>

<!-- 📄 LETTER -->
<div class="letter">
  <h2>My Love ❤️</h2>
  <p>This is everything I want to tell you...</p>
</div>

<script>

function openCard() {

  const card = document.querySelector(".card");

  const rect = card.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;

  const emojis = ["❤️","💖","💘","💞","💋","💐"];

  // 💥 EMOJI BURST (FULL SCREEN COVER)
  for (let i = 0; i < 120; i++) {

    const p = document.createElement("div");
    p.className = "particle";
    p.innerText = emojis[Math.floor(Math.random() * emojis.length)];

    document.body.appendChild(p);

    p.style.left = cx + "px";
    p.style.top = cy + "px";

    const size = 120 + Math.random() * 260;
    p.style.fontSize = size + "px";

    const angle = Math.random() * Math.PI * 2;
    const dist = 500 + Math.random() * 1000;

    const dx = Math.cos(angle) * dist;
    const dy = Math.sin(angle) * dist;

    setTimeout(() => {
      p.style.opacity = "1";
      p.style.transform = `translate(${dx}px, ${dy}px) scale(2)`;
    }, 50);
  }

  // 💌 hide main heart/text
  setTimeout(() => {
    card.style.opacity = "0";
  }, 300);

  // 🌫 fade emojis
  setTimeout(() => {
    document.querySelectorAll(".particle").forEach(p => {
      p.style.opacity = "0";
    });
  }, 2000);

  // 📄 show letter
  setTimeout(() => {
    document.body.classList.add("show");
  }, 3000);
}

</script>

</body>
</html>
