<!DOCTYPE html>
<html>
<head>
  <title>For You ❤️</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #ffe4ec;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial;
    }

    .scene {
      text-align: center;
    }

    /* OUTER ENVELOPE (WHITE ONLY) */
    .envelope {
      position: relative;
      width: 340px;
      height: 220px;
      background: #ffffff; /* FORCE WHITE */
      border-radius: 10px;
      cursor: pointer;
      box-shadow: 0 12px 30px rgba(0,0,0,0.2);
      overflow: hidden;
    }

    /* FLAP (ONLY PINK PART) */
    .flap {
      position: absolute;
      width: 0;
      height: 0;
      border-left: 170px solid transparent;
      border-right: 170px solid transparent;
      border-top: 120px solid #ff6f91;
      top: 0;
      left: 0;
      transform-origin: top;
      transition: 0.6s;
      z-index: 2;
    }

    /* CONTENT AREA (BEHIND HEART) */
    .paper {
      position: absolute;
      width: 140px;
      height: 160px;
      background: white;
      left: 100px;
      top: 60px;
      border-radius: 6px;
      padding: 10px;
      box-sizing: border-box;
      transition: 0.8s ease;
      transform: scale(0.3);
      transform-origin: center;
      z-index: 1; /* behind heart */
      overflow: hidden;
    }

    /* HEART (ALWAYS ON TOP) */
    .heart {
      position: absolute;
      width: 45px;
      height: 45px;
      background: #e60026;
      top: 88px;
      left: 147px;
      transform: rotate(45deg);
      z-index: 10; /* TOP LAYER ALWAYS */
    }

    .heart::before,
    .heart::after {
      content: "";
      position: absolute;
      width: 45px;
      height: 45px;
      background: #e60026;
      border-radius: 50%;
    }

    .heart::before { top: -22px; left: 0; }
    .heart::after { left: -22px; top: 0; }

    /* STAGE 1 */
    .stage1 .flap {
      transform: rotateX(180deg);
    }

    .stage1 .paper {
      transform: scale(0.6);
      top: 30px;
    }

    /* STAGE 2 */
    .stage2 .paper {
      transform: scale(1.5);
      top: -130px;
    }

    h2 {
      margin: 0;
      font-size: 16px;
    }

    ul {
      text-align: left;
      padding-left: 15px;
      font-size: 12px;
    }

    .hint {
      margin-top: 15px;
    }
  </style>
</head>

<body>

<div class="scene">
  <div class="envelope" id="env" onclick="openEnvelope()">

    <div class="flap"></div>
    <div class="paper">
      <h2>My Love ❤️</h2>
      <p>Everything I feel for you...</p>

      <h3>100 Things</h3>
      <ul>
        <li>Your smile</li>
        <li>Your laugh</li>
        <li>Your kindness</li>
      </ul>
    </div>

    <div class="heart"></div>

  </div>

  <p class="hint">Click → open → reveal 💌</p>
</div>

<script>
let stage = 0;

function openEnvelope() {
  const env = document.getElementById("env");

  if (stage === 0) {
    env.classList.add("stage1");
    stage = 1;
  } else if (stage === 1) {
    env.classList.add("stage2");
    stage = 2;
  }
}
</script>

</body>
</html>
