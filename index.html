<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<style>
  body {
    margin: 0;
    overflow: hidden;
    background: #f7e9ff;
    font-family: Arial;
  }

  /* ✉️ SINGLE ENVELOPE */
  .envelope {
    width: 80vw;
    max-width: 320px;
    height: 200px;

    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);

    cursor: pointer;
    z-index: 100;
    perspective: 1000px;
  }

  .body {
    width: 100%;
    height: 100%;
    background: white;
    border-radius: 10px;
    position: absolute;
    box-shadow: 0 20px 40px rgba(0,0,0,0.25);
  }

  /* fold lines */
  .body::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background:
      linear-gradient(to bottom right, transparent 49%, #ddd 50%, transparent 51%),
      linear-gradient(to bottom left, transparent 49%, #ddd 50%, transparent 51%);
    opacity: 0.5;
  }

  /* flap */
  .flap {
    position: absolute;
    width: 100%;
    height: 100%;
    background: white;
    clip-path: polygon(0 0, 100% 0, 50% 55%);
    transform-origin: top;
    transform: rotateX(0deg);
    transition: transform 1s ease;
    z-index: 2;
  }

  .open .flap {
    transform: rotateX(-180deg);
  }

  /* ❤️ HEART */
  .center-heart {
    position: absolute;
    top: 55%;
    left: 50%;
    transform: translate(-50%, -50%) rotate(45deg);
    width: 45px;
    height: 45px;
    background: #d1003f;
    z-index: 3;
  }

  .center-heart::before,
  .center-heart::after {
    content: "";
    position: absolute;
    width: 45px;
    height: 45px;
    background: #d1003f;
    border-radius: 50%;
  }

  .center-heart::before { top: -22px; left: 0; }
  .center-heart::after { left: -22px; top: 0; }

  /* 💥 EMOJIS */
  .particle {
    position: fixed;
    z-index: 10;
    pointer-events: none;
    opacity: 0;
    transition: transform 1.5s ease, opacity 2s ease;
  }

  /* 📄 LETTER */
  .letter {
    position: fixed;
    inset: 12px;
    background: #fffafc;
    border-radius: 14px;
    padding: 20px;

    opacity: 0;
    transform: scale(0.85);
    transition: 1.2s ease;

    z-index: 999;
    pointer-events: none;
  }

  .show .letter {
    opacity: 1;
    transform: scale(1);
  }

</style>
</head>

<body>

<!-- ✉️ ONLY ONE ENVELOPE -->
<div class="envelope" onclick="start()">
  <div class="body"></div>
  <div class="flap"></div>
  <div class="center-heart"></div>
</div>

<!-- 📄 LETTER -->
<div class="letter">
  <h2>My Love ❤️</h2>
  <p>This is everything I want to tell you...</p>
</div>

<script>

function start() {

  const envelope = document.querySelector(".envelope");
  envelope.classList.add("open");

  const rect = envelope.getBoundingClientRect();

  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;

  const emojis = ["❤️","💋","💖","💞"];

  /* 💥 SHOOT OUT EMOJIS */
  for (let i = 0; i < 90; i++) {

    const p = document.createElement("div");
    p.className = "particle";
    p.innerText = emojis[Math.floor(Math.random()*emojis.length)];

    document.body.appendChild(p);

    /* start inside envelope */
    p.style.left = cx + "px";
    p.style.top = cy + "px";

    const size = 120 + Math.random() * 240;
    p.style.fontSize = size + "px";

    const angle = Math.random() * Math.PI * 2;
    const dist = 300 + Math.random() * 800;

    const dx = Math.cos(angle) * dist;
    const dy = Math.sin(angle) * dist;

    setTimeout(() => {
      p.style.opacity = "1";
      p.style.transform = `translate(${dx}px, ${dy}px) scale(1.6)`;
    }, 80);
  }

  /* 🌫 FADE OUT EMOJIS */
  setTimeout(() => {
    document.querySelectorAll(".particle").forEach(p => {
      p.style.opacity = "0";
    });
  }, 2000);

  /* 📄 SHOW LETTER */
  setTimeout(() => {
    document.body.classList.add("show");
  }, 3200);

}

</script>

</body>
</html>
