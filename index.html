<!DOCTYPE html>
<html>
<head>
  <title>For You ❤️</title>
  <style>
    body {
      margin: 0;
      background: #ffe4ec;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial;
    }

    .container {
      text-align: center;
    }

    .envelope {
      width: 260px;
      height: 160px;
      background: #ff6f91;
      position: relative;
      cursor: pointer;
      border-radius: 10px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      transition: transform 0.4s;
    }

    .envelope:hover {
      transform: scale(1.05);
    }

    .letter {
      position: absolute;
      bottom: 0;
      width: 220px;
      left: 20px;
      height: 0;
      background: white;
      overflow: hidden;
      transition: 0.8s ease;
      border-radius: 5px;
      padding: 0 10px;
    }

    .open .letter {
      height: 300px;
      padding: 15px;
    }

    ul {
      text-align: left;
    }
  </style>
</head>

<body>

<div class="container">
  <div class="envelope" onclick="openLetter(this)">
    <div class="letter">
      <h2>My Love 💖</h2>
      <p>This is for you...</p>

      <h3>100 Things I Love About You</h3>
      <ul>
        <li>Your smile</li>
        <li>Your laugh</li>
        <li>The way you care</li>
      </ul>
    </div>
  </div>

  <p style="margin-top:20px;">Click the envelope 💌</p>
</div>

<script>
function openLetter(el) {
  el.classList.toggle("open");
}
</script>

</body>
</html>
