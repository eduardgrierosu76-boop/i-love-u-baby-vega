<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You ❤️</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  font-family: Arial;
  background: #f7e9ff;
  transition: background 2.5s ease;
}

/* 🌌 NIGHT SKY */
body.night {
  background: radial-gradient(circle at top, #1a0f2e, #05010a);
}

/* ⭐ STAR LAYER */
.star {
  position: fixed;
  width: 2px;
  height: 2px;
  background: white;
  border-radius: 50%;
  opacity: 0.6;
  animation: twinkle 3s infinite ease-in-out;
  z-index: 0;
}

@keyframes twinkle {
  0%,100% { opacity: 0.2; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.6); }
}

/* 🎬 CAMERA STAGE */
.stage {
  position: absolute;
  inset: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  transition: transform 2s ease;
}

.zoom .stage {
  transform: scale(1.12) rotateX(6deg);
}

/* 💗 BACKGROUND HEARTS */
.bg-heart {
  position: fixed;
  z-index: 1;
  pointer-events: none;
  color: rgba(255, 0, 80, 0.25);
  animation: floatUp linear infinite;
}

@keyframes floatUp {
  from { transform: translateY(100vh); }
  to { transform: translateY(-10vh); }
}

/* 💓 HEARTBEAT FLASH */
.flash {
  position: fixed;
  inset: 0;
  background: white;
  opacity: 0;
  z-index: 99999;
  pointer-events: none;
}

.beat .flash {
  animation: beatFlash 1.2s ease;
}

@keyframes beatFlash {
  0% { opacity: 0; }
  20% { opacity: 0.4; }
  100% { opacity: 0; }
}

/* ✉️ ENVELOPE (BREATHING) */
.envelope {
  width: 340px;
  height: 220px;
  position: relative;
  cursor: pointer;
  filter: drop-shadow(0 20px 35px rgba(0,0,0,0.35));
  animation: breathe 2.8s ease-in-out infinite;
}

@keyframes breathe {
  0%,100% { transform: scale(1); }
  50% { transform: scale(1.03); }
}

/* BASE */
.base {
  position: absolute;
  width: 100%;
  height: 100%;
  background: #fff;
  border: 2px solid #ead7df;
  border-radius: 8px;
}

/* FLAP */
.flap {
  position: absolute;
  width: 100%;
  height: 60%;
  top: 0;
  background: white;
  clip-path: polygon(0 0, 100% 0, 50% 100%);
  transform-origin: top;
  transition: transform 1s ease;
  border-bottom: 2px solid #ead7df;
  z-index: 3;
}

.open .flap {
  transform: rotateX(-175deg);
}

/* ❤️ HEART */
.heart {
  position: absolute;
  top: 55%;
  left: 50%;
  transform: translate(-50%, -50%) rotate(45deg);
  width: 55px;
  height: 55px;
  background: #d1003f;
  animation: pulse 1.2s infinite;
}

.heart::before,
.heart::after {
  content: "";
  position: absolute;
  width: 55px;
  height: 55px;
  background: #d1003f;
  border-radius: 50%;
}

.heart::before { top: -27px; }
.heart::after { left: -27px; }

@keyframes pulse {
  0% { transform: translate(-50%, -50%) rotate(45deg) scale(1); }
  50% { transform: translate(-50%, -50%) rotate(45deg) scale(1.25); }
  100% { transform: translate(-50%, -50%) rotate(45deg) scale(1); }
}

/* TEXT */
.text {
  position: absolute;
  bottom: 14px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 14px;
  color: #7a4a6a;
}

/* 💥 PARTICLES */
.particle {
  position: fixed;
  z-index: 9999;
  pointer-events: none;
  opacity: 0;
  transition: transform 2.2s ease, opacity 2.5s ease;
}

/* 📄 LETTER (PAPER DEPTH + CURL CORNERS) */
.letter {
  position: fixed;
  inset: 0;
  background: #fffaf5;
  padding: 28px;

  opacity: 0;
  transform: translateY(40px) scale(0.95);
  transition: 1.5s ease;

  z-index: 100000;

  overflow-y: auto;
  -webkit-overflow-scrolling: touch;

  box-shadow: 0 -20px 80px rgba(0,0,0,0.4);

  /* paper curl illusion */
  border-radius: 12px;
  background-image:
    linear-gradient(to bottom right, rgba(0,0,0,0.03), transparent);
}

.show .letter {
  opacity: 1;
  transform: translateY(0) scale(1);
}

/* typing effect */
.type {
  white-space: pre-wrap;
}
</style>
</head>

<body>

<div class="flash"></div>

<!-- 💗 HEARTS -->
<script>
for (let i = 0; i < 18; i++) {
  const h = document.createElement("div");
  h.className = "bg-heart";
  h.innerText = "❤️";
  h.style.left = Math.random() * 100 + "vw";
  h.style.animationDuration = (6 + Math.random() * 6) + "s";
  h.style.fontSize = (14 + Math.random() * 18) + "px";
  document.body.appendChild(h);
}

/* ⭐ STARS */
for (let i = 0; i < 40; i++) {
  const s = document.createElement("div");
  s.className = "star";
  s.style.left = Math.random()*100 + "vw";
  s.style.top = Math.random()*100 + "vh";
  s.style.animationDuration = (2 + Math.random()*3) + "s";
  document.body.appendChild(s);
}
</script>

<div class="stage">

<div class="envelope" onclick="openEnvelope()">
  <div class="base"></div>
  <div class="flap"></div>
  <div class="heart"></div>
  <div class="text">for someone special</div>
</div>

</div>

<!-- 📄 LETTER -->
<div class="letter" id="letter">
<h2>something you need to know:</h2>
<p id="typeText"></p>
</div>

<script>

/* YOUR FULL TEXT (UNCHANGED) */
const fullText = `Hola amor. Quiero empezar diciendo que perdón por lo mucho que esto ha tardado. No sé cómo programar cosas ni mucho español, así que si no tiene sentido, perdón. Pero hice esto para agradecerte por todo, gracias por estar aquí cuando más me necesitaba, gracias por escucharme, gracias por escribirme todos los días, gracias por existir.

Antes de conocerte pensaba que no iba a necesitar a nadie durante mucho tiempo, solo quería estar solo, pero que hayas llegado a mi vida fue lo mejor que me ha pasado. No esperaba estar pensando en ti cada segundo del día, o despertarme solo para sonreír cuando me escribías. Haces que mis días sean mejores cada día, y espero que yo también haga los tuyos mejores.

He estado perdido por un tiempo y hemos hablado durante tanto tiempo y aún así no sé qué quiero hacer con mi futuro, pero sí sé una cosa con seguridad: te amo, y sin importar cómo se vea mi futuro, quiero que sea contigo. Quiero despertarme cada día contigo en mis brazos, quiero estar ahí para ti cuando más me necesites, quiero saber todo sobre ti, quiero hacer todo contigo, quiero envejecer contigo, porque te amo.

Y tal vez no lo demuestre lo suficiente, pero me importas, y siempre quiero que sepas que no importa lo que pase, siempre voy a estar aquí para ti. Cuando solo veas oscuridad, siempre voy a estar aquí para mostrarte la luz.

Debería haber hecho esta carta hace mucho tiempo, pero nunca tuve suficientes palabras para describir lo mucho que significas para mí, y aún no las tengo. Pero eres perfecta, mi amor. Sueño contigo cada noche. Si Dios creó la perfección, eres tú.

Y aunque no tenga suficientes palabras para decir cuánto te amo, aquí tienes 100 de las millones de cosas que amo de ti:`;

/* CINEMATIC START */
function openEnvelope() {

  navigator.vibrate?.([200, 100, 200]); // 💓 vibration

  document.body.classList.add("beat","zoom","night");

  const envelope = document.querySelector(".envelope");
  envelope.classList.add("open");

  const rect = envelope.getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;

  const emojis = ["❤️","💖","💘","💞","💋"];

  setTimeout(() => {

    for (let i = 0; i < 70; i++) {
      const p = document.createElement("div");
      p.className = "particle";
      p.innerText = emojis[Math.floor(Math.random()*emojis.length)];
      document.body.appendChild(p);

      p.style.left = cx + "px";
      p.style.top = cy + "px";

      const size = 120 + Math.random() * 200;
      p.style.fontSize = size + "px";

      const angle = Math.random() * Math.PI * 2;
      const dist = 600 + Math.random() * 900;

      const dx = Math.cos(angle) * dist;
      const dy = Math.sin(angle) * dist;

      setTimeout(() => {
        p.style.opacity = "1";
        p.style.transform = `translate(${dx}px, ${dy}px) scale(2)`;
      }, 60);
    }

  }, 900);

  setTimeout(() => {
    envelope.style.opacity = "0";
    document.body.classList.add("show");
    typeWriter(fullText);
  }, 4200);
}

/* ⌨️ TYPING EFFECT */
function typeWriter(text) {
  const el = document.getElementById("typeText");
  let i = 0;

  function type() {
    if (i < text.length) {
      el.innerHTML += text.charAt(i);
      i++;
      setTimeout(type, 8);
    }
  }

  type();
}

</script>

</body>
</html>
