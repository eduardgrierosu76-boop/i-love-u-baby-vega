<!DOCTYPE html>
<html>
<head>
  <title>For You ❤️</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #f6e9ff;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial;
    }

    .scene {
      text-align: center;
    }

    /* ENVELOPE BASE (REALISTIC SHAPE) */
    .envelope {
      position: relative;
      width: 360px;
      height: 240px;
      background: #ffffff;
      border-radius: 10px;
      cursor: pointer;
      box-shadow: 0 15px 35px rgba(0,0,0,0.2);
      overflow: hidden;
    }

    /* FRONT FLAP (DIAGONAL ENVELOPE LOOK) */
    .flap {
      position: absolute;
      width: 0;
      height: 0;
      border-left: 180px solid transparent;
      border-right: 180px solid transparent;
      border-top: 130px solid #e8d7ff;
      top: 0;
      left: 0;
      transform-origin: top;
      transition: 0.7s ease;
      z-index: 3;
    }

    /* INNER POCKET LINES (MAKES IT LOOK LIKE ENVELOPE) */
    .envelope::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: linear-gradient(to bottom right, transparent 49%, #f0f0f0 50%);
      z-index: 1;
    }

    /* PAPER (START HIDDEN INSIDE ENVELOPE) */
    .paper {
      position: absolute;
      width: 300px;
      height: 420px; /* A4-ish feel */
      background: #fffafc;
      left: 30px;
      top: 240px;
      border-radius: 8px;
      padding: 18px;
      box-sizing: border-box;
      transition: all 0.9s ease;
      z-index: 2;
      overflow: hidden;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    }

    /* HEART (ONLY ON CLOSED ENVELOPE) */
    .heart {
      position: absolute;
      width: 55px;
      height: 55px;
      background: #d1003f;
      top: 92px;
      left: 152px;
      transform: rotate(45deg);
      z-index: 5;
      transition: opacity 0.4s ease;
    }

    .heart::before,
    .heart::after {
      content: "";
      position: absolute;
      width: 55px;
      height: 55px;
      background: #d1003f;
      border-radius: 50%;
    }

    .heart::before { top: -27px; left: 0; }
    .heart::after { left: -27px; top: 0; }

    /* STAGE 1 */
    .stage1 .flap {
      transform: rotateX(180deg);
    }

    .stage1 .paper {
      top: 20px;
    }

    /* STAGE 2 (A4 EXPANDED VIEW) */
    .stage2 .paper {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 80vw;
      height: 85vh;
      z-index: 10;
    }

    /* HEART DISAPPEARS AFTER FIRST CLICK */
    .stage1 .heart,
    .stage2 .heart {
      opacity: 0;
    }

    h2 {
      margin-top: 0;
    }

    ul {
      text-align: left;
    }

    .hint {
      margin-top: 15px;
      color: #333;
    }
  </style>
</head>

<body>

<div class="scene">
  <div class="envelope" id="env" onclick="openEnvelope()">

    <div class="flap"></div>
    <div class="heart"></div>

    <div class="paper">
      <h2>My Love ❤️</h2>
      <p>This is everything I want you to know...</p>

      <h3>100 Things I Love About You</h3>
      <ul>
        <li>Your smile</li>
        <li>Your laugh</li>
        <li>Your kindness</li>
      </ul>
    </div>

  </div>

  <p class="hint">Click → open → full letter 💌</p>
</div>

<script>
let stage = 0;

function openEnvelope() {
  const env = document.getElementById("env");

  if (stage === 0) {
    env.classList.add("stage1");
    stage = 1;
  } else if (stage === 1) {
    env.classList.add("stage2");
    stage = 2;
  }
}
</script>

</body>
</html>
